<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#DC2626" />
<link rel="manifest" href="manifest.json" />
<title>GymDash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #0A0A0A;
  --surface:      #171717;
  --surface2:     #222222;
  --primary:      #DC2626;
  --primary-dim:  rgba(220,38,38,0.15);
  --accent:       #F59E0B;
  --text:         #FAFAFA;
  --text-muted:   #A3A3A3;
  --border:       #2A2A2A;
  --green:        #22C55E;
}

/* ── THEME SWATCHES ── */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 8px;
}
.theme-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 8px 4px;
  border-radius: 12px;
  border: 2px solid transparent;
  transition: border-color 0.15s;
}
.theme-swatch.active { border-color: var(--primary); }
.theme-swatch-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1);
}
.theme-swatch-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  text-align: center;
}
.theme-swatch.active .theme-swatch-label { color: var(--text); }

body {
  font-family: 'Raleway', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 12px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid var(--border);
}
.topbar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
}
.topbar-title span { color: var(--primary); }
.topbar-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── PAGES ── */
.page { display: none; flex: 1; overflow-y: auto; padding: 16px 16px 96px; }
.page.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.section-heading {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 12px;
  margin-top: 4px;
}

/* ── STAT CHIPS ── */
.stat-row { display: flex; gap: 10px; margin-bottom: 12px; }
.stat-chip {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 8px;
  text-align: center;
}
.stat-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* ── PILLS ── */
.pill-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.pill-row::-webkit-scrollbar { display: none; }
/* Show a thin scrollbar on pointer/mouse devices (Windows browser) */
@media (pointer: fine) {
  .pill-row { scrollbar-width: thin; scrollbar-color: var(--primary) var(--surface2); padding-bottom: 6px; }
  .pill-row::-webkit-scrollbar { display: block; height: 4px; }
  .pill-row::-webkit-scrollbar-track { background: var(--surface2); border-radius: 2px; }
  .pill-row::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }
}
.pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill.active { background: var(--primary); color: white; border-color: var(--primary); }

/* ── FORM ELEMENTS ── */
.select-field {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
  font-weight: 500;
  appearance: none;
  cursor: pointer;
  margin-bottom: 10px;
}
.select-field:focus { outline: none; border-color: var(--primary); }

/* Form guide link */
.form-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  transition: opacity 0.15s;
}
.form-link-btn:hover { opacity: 0.75; }

.input-row { display: flex; gap: 8px; margin-top: 10px; }
.input-row > div { flex: 1; min-width: 0; }
.input-field {
  width: 100%;
  min-width: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 6px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  text-align: center;
}
.input-field::placeholder { color: var(--text-muted); }
.input-field:focus { outline: none; border-color: var(--primary); }

.input-label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 4px;
}

/* ── BUTTONS ── */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Raleway', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  margin-top: 10px;
  transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.85; }

.btn-outline {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 14px;
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.15s;
}
.btn-outline:active { border-color: var(--primary); color: var(--primary); }

.btn-sm {
  padding: 6px 12px;
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Raleway', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-sm:active { border-color: var(--primary); color: var(--primary); }

/* ── SET ROWS ── */
.set-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.set-row:last-of-type { border-bottom: none; }
.set-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
.set-name {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.set-meta { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; }
.set-delete {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  flex-shrink: 0;
  line-height: 1;
  font-size: 16px;
  transition: color 0.15s;
}
.set-delete:active { color: var(--primary); }

/* ── SESSION GROUP (TODAY'S SETS) ── */
.session-group { margin-bottom: 8px; }
.session-group:last-of-type { margin-bottom: 0; }
.session-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  padding: 8px 0 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
  cursor: pointer;
  user-select: none;
}
.session-group-chevron { font-size: 10px; transition: transform 0.2s; }
.session-group.expanded .session-group-chevron { transform: rotate(180deg); }
.session-group-body { display: none; }
.session-group.expanded .session-group-body { display: block; }

/* ── TROPHIES ── */
.trophy-summary {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}
.trophy-summary-count {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  line-height: 1;
  color: var(--primary);
  min-width: 56px;
  text-align: center;
}
.trophy-summary-text { flex: 1; }
.trophy-summary-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
}
.trophy-summary-sub {
  font-size: 13px;
  color: var(--text);
  margin-top: 2px;
}
.trophy-progress-bar {
  width: 100%;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.trophy-progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.trophy-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.trophy-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 8px;
  position: relative;
  transition: transform 0.2s;
  overflow: hidden;
}
.trophy-card.earned { border-color: var(--trophy-color, var(--primary)); }
.trophy-card.earned::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--trophy-color, var(--primary));
  opacity: 0.06;
}
.trophy-icon-wrap {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.trophy-card.earned .trophy-icon-wrap {
  background: color-mix(in srgb, var(--trophy-color, var(--primary)) 15%, var(--surface));
  border-color: var(--trophy-color, var(--primary));
}
.trophy-icon-wrap svg {
  width: 22px;
  height: 22px;
  stroke: var(--text-muted);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.trophy-card.earned .trophy-icon-wrap svg { stroke: var(--trophy-color, var(--primary)); }
.trophy-tier-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text-muted);
}
.trophy-card.earned .trophy-tier-badge {
  background: color-mix(in srgb, var(--trophy-color, var(--primary)) 20%, var(--surface));
  color: var(--trophy-color, var(--primary));
}
.trophy-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 0.5px;
  color: var(--text);
  line-height: 1.1;
}
.trophy-card.locked .trophy-name { color: var(--text-muted); }
.trophy-desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
}
.trophy-card.locked {
  opacity: 0.55;
  filter: grayscale(0.4);
}
.trophy-section-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  padding: 8px 0 4px;
}

/* ── SESSION CARDS (HISTORY) ── */
.session-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
}
.session-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.session-badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; max-width: 60%; }
.session-date { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }
.session-badge {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  background: var(--primary-dim);
  padding: 4px 10px;
  border-radius: 50px;
}
.session-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.session-tag {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--surface2);
  padding: 4px 10px;
  border-radius: 50px;
  border: 1px solid var(--border);
}
.session-detail { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: none; }
.session-card.expanded .session-detail { display: block; }
.detail-group { margin-bottom: 10px; }
.detail-group-name {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  margin-bottom: 6px;
}
.detail-set-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.detail-set-row:last-child { border-bottom: none; }
.detail-set-label { color: var(--text-muted); }
.detail-set-val { font-family: 'JetBrains Mono', monospace; color: var(--text); font-size: 12px; }

/* ── PR ROWS (PROGRESS) ── */
.pr-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.pr-row:last-child { border-bottom: none; }
.pr-name { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
.pr-right { text-align: right; flex-shrink: 0; }
.pr-weight { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); line-height: 1; }
.pr-trend { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.pr-trend.up { color: var(--green); }
.pr-trend.down { color: var(--primary); }

/* ── CHART ── */
.chart-controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
.chart-toggle { display: flex; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; }
.chart-toggle-btn {
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 700;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.chart-toggle-btn.active { background: var(--primary); color: white; }

canvas#chart { width: 100%; border-radius: 12px; display: block; }

/* ── SETTINGS ── */
.routine-card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
}
.routine-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
}
.routine-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }
.routine-chevron {
  color: var(--text-muted);
  transition: transform 0.2s;
  font-size: 14px;
}
.routine-card.expanded .routine-chevron { transform: rotate(180deg); }
.routine-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.routine-card.expanded .routine-body { display: block; }
.routine-ex-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.routine-ex-row:last-of-type { border-bottom: none; }
.routine-ex-name { flex: 1; font-size: 14px; font-weight: 500; }
.routine-ex-delete {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  transition: color 0.15s;
}
.routine-ex-delete:active { color: var(--primary); }
.add-exercise-row { display: flex; gap: 8px; margin-top: 10px; }
.add-exercise-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: 13px;
}
.add-exercise-input:focus { outline: none; border-color: var(--primary); }

.data-btn-row { display: flex; gap: 10px; margin-top: 10px; }
.data-btn-row .btn-outline { margin-top: 0; }

/* ── NEW ROUTINE FORM ── */
.new-routine-card {
  background: var(--surface);
  border: 1px dashed var(--primary);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 10px;
}
.new-routine-card .card-label { margin-bottom: 10px; color: var(--primary); }
.new-routine-name-row { display: flex; gap: 8px; margin-bottom: 10px; }
.new-routine-name-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
  font-weight: 600;
}
.new-routine-name-input:focus { outline: none; border-color: var(--primary); }
.new-routine-ex-list { margin-bottom: 10px; }
.new-routine-ex-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  margin: 3px 3px 3px 0;
}
.new-routine-ex-chip button {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  padding: 0;
  line-height: 1;
}
.routine-delete-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  padding: 4px 6px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  margin-left: 4px;
}
.routine-delete-btn:active { color: #ef4444; background: rgba(239,68,68,0.1); }
.routine-default-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 7px;
  margin-left: 8px;
  align-self: center;
}
.new-routine-btn-row { display: flex; gap: 8px; margin-top: 4px; }

/* ── THEME SWATCHES ── */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 8px;
}
.theme-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 8px 4px;
  border-radius: 12px;
  border: 2px solid transparent;
  transition: border-color 0.15s;
}
.theme-swatch.active { border-color: var(--primary); }
.theme-swatch-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 3px solid rgba(128,128,128,0.2);
}
.theme-swatch-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  text-align: center;
}
.theme-swatch.active .theme-swatch-label { color: var(--text); }

/* ── CUSTOM EXERCISE INLINE ── */
.custom-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.custom-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--primary);
  border-radius: 12px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
}
.custom-input:focus { outline: none; }

/* ── CALENDAR (HISTORY) ── */
.cal-wrap { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 14px; margin-bottom: 12px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-month-label { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }
.cal-nav { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; padding: 2px 8px; line-height: 1; transition: color 0.15s; }
.cal-nav:hover { color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow { font-size: 9px; font-weight: 700; text-align: center; color: var(--text-muted); padding: 4px 0; text-transform: uppercase; letter-spacing: 0.5px; }
.cal-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-size: 12px;
  position: relative;
  cursor: default;
  color: var(--text-muted);
}
.cal-day.in-month { color: var(--text); }
.cal-day.has-workout { background: var(--primary-dim); color: var(--primary); font-weight: 700; cursor: pointer; }
.cal-day.selected { background: var(--primary); color: #fff; font-weight: 700; }
.cal-day.today:not(.selected) { border: 1px solid var(--border); }

/* ── PR GROUPS (PROGRESS) ── */
.pr-group { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
.pr-group-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
.pr-group-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }
.pr-group-meta { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
.pr-group-chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 14px; margin-left: 8px; }
.pr-group.expanded .pr-group-chevron { transform: rotate(180deg); }
.pr-group-body { display: none; padding: 0 16px 12px; border-top: 1px solid var(--border); }
.pr-group.expanded .pr-group-body { display: block; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
  pointer-events: none;
  max-width: 90%;
}
.toast.show { opacity: 1; }

/* ── BOTTOM NAV ── */
.bottomnav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0 14px;
  cursor: pointer;
  color: var(--text-muted);
  border: none;
  background: none;
  gap: 4px;
  transition: color 0.15s;
}
.nav-tab.active { color: var(--primary); }
.nav-icon { width: 22px; height: 22px; }
.nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-family: 'Raleway', sans-serif; }
</style>
</head>

function applyTheme(id) {
  const t = THEMES[id] || THEMES.noir;

  r.setProperty('--surface',     t.surface);
  r.setProperty('--surface2',    t.surface2);

  r.setProperty('--text',        t.text);
  r.setProperty('--text-muted',  t.textMuted);
  r.setProperty('--border',      t.border);
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', t.primary);
  localStorage.setItem('gymdash_theme', id);
}

function initTheme() {
  const saved = localStorage.getItem('gymdash_theme') || 'noir';
  applyTheme(saved);
}

function setTheme(id) {

  if (name === 'history') renderHistory();

function computeStreakFromWorkouts(workouts) {
  if (!workouts.length) return 0;
  const weeks = new Set(workouts.map(w => {
    const d = parseIso(w.date);
    const jan1 = new Date(d.getFullYear(), 0, 1);
    return d.getFullYear() + '-' + Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  }));
  const sorted = [...weeks].sort();
  let streak = 1, best = 1;
  for (let i = 1; i < sorted.length; i++) {
    const [y1, w1] = sorted[i-1].split('-').map(Number);
    const [y2, w2] = sorted[i].split('-').map(Number);
    const consecutive = (y1 === y2 && w2 === w1 + 1) || (y2 === y1 + 1 && w1 >= 52 && w2 === 1);
    if (consecutive) { streak++; best = Math.max(best, streak); } else streak = 1;
  }
  return best;
}

function computeTrophies() {
  const { workouts } = getData();
  return TROPHY_DEFS.map(t => ({ ...t, earned: t.check(workouts) }));
}

// ── STORAGE ──
function getData() {
  const workouts = JSON.parse(localStorage.getItem('gymdash_workouts') || '[]');
  let routines   = JSON.parse(localStorage.getItem('gymdash_routines') || 'null') || DEFAULT_ROUTINES;
  // Merge any new default routines not yet saved
  let changed = false;
  Object.entries(DEFAULT_ROUTINES).forEach(([name, exercises]) => {
    if (!routines[name]) { routines[name] = exercises; changed = true; }
  });
  if (changed) saveRoutines(routines);
  return { workouts, routines };
}
function saveWorkouts(arr) { localStorage.setItem('gymdash_workouts', JSON.stringify(arr)); }
function saveRoutines(obj) { localStorage.setItem('gymdash_routines', JSON.stringify(obj)); }
function saveSession()     { localStorage.setItem('gymdash_session',  JSON.stringify({ sets: currentSession, routine: currentRoutine, date: isoDate(new Date()) })); }
function clearSession()    { localStorage.removeItem('gymdash_session'); }

// ── WEEK HELPERS ──
function getWeekBounds(date) {
  const d = new Date(date);
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - ((day + 6) % 7)); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  return { mon, sun };
}
function isoDate(d) { return d.toISOString().slice(0,10); }
function parseIso(str) {
  if (!str) return null;
  if (str.includes('/')) {
    const [m,d,y] = str.split('/');
    return new Date(+y, +m-1, +d);
  }
  const [y,m,d] = str.split('-');
  return new Date(+y, +m-1, +d);
}

// ── COMPUTED STATS ──
function computeThisWeek() {
  const { workouts } = getData();
  const { mon, sun } = getWeekBounds(new Date());
  return workouts.filter(w => {
    const d = parseIso(w.date);
    return d >= mon && d <= sun;
  }).length;
}

function computeStreak() {
  const { workouts } = getData();
  if (!workouts.length) return 0;
  let streak = 0;
  let checkDate = new Date();
  for (let i = 0; i < 52; i++) {
    const { mon, sun } = getWeekBounds(checkDate);
    const count = workouts.filter(w => {
      const d = parseIso(w.date);
      return d >= mon && d <= sun;
    }).length;
    if (count >= 4) { streak++; checkDate = new Date(mon); checkDate.setDate(mon.getDate() - 1); }
    else break;
  }
  return streak;
}

function computeTopPR() {
  const { workouts } = getData();
  let best = null;
  workouts.forEach(w => {
    w.sets.forEach(s => {
      if (!best || s.weight > best.weight) best = { exercise: s.exercise, weight: s.weight };
    });
  });
  return best;
}

function computePRs() {
  const { workouts } = getData();
  const prMap = {};
  const sorted = [...workouts].sort((a,b) => parseIso(a.date) - parseIso(b.date));
  const exSessions = {};
  sorted.forEach(w => {
    w.sets.forEach(s => {
      if (s.bodyweight) return;
      if (!prMap[s.exercise] || s.weight > prMap[s.exercise].max) {
        prMap[s.exercise] = { max: s.weight, prev: prMap[s.exercise]?.max || null };
      }
    });
    const exInSession = {};
    w.sets.forEach(s => {
      if (s.bodyweight) return;
      if (!exInSession[s.exercise] || s.weight > exInSession[s.exercise]) exInSession[s.exercise] = s.weight;
    });
    Object.entries(exInSession).forEach(([ex, wt]) => {
      if (!exSessions[ex]) exSessions[ex] = [];
      exSessions[ex].push(wt);
    });
  });
  return Object.entries(prMap).map(([exercise, { max }]) => {
    const sessions = exSessions[exercise] || [];
    const last = sessions[sessions.length - 1] || 0;
    const prev = sessions[sessions.length - 2] || null;
    const trend = prev === null ? null : last - prev;
    return { exercise, max, trend };
  }).sort((a,b) => b.max - a.max);
}

function getChartData(exercise, mode) {
  const { workouts } = getData();
  const sessions = workouts
    .filter(w => w.sets.some(s => s.exercise === exercise))
    .sort((a,b) => parseIso(a.date) - parseIso(b.date))
    .slice(-8);
  return sessions.map(w => {
    const sets = w.sets.filter(s => s.exercise === exercise);
    const value = mode === 'max'
      ? Math.max(...sets.map(s => s.weight))
      : sets.reduce((sum, s) => sum + s.weight * s.reps, 0);
    const d = parseIso(w.date);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    return { label, value };
  });
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ── LOG STATE ──
let currentSession = [];
let currentRoutine = 'Chest';
let sessionGroupCollapsed = new Set();

const DAY_ROUTINE = { 1:'Chest', 2:'Legs', 3:"Back & Bi's", 5:'Shoulders' };

function initLog() {
  const day   = new Date().getDay();
  const saved = JSON.parse(localStorage.getItem('gymdash_session') || 'null');
  const today = isoDate(new Date());
  if (saved && saved.date === today) {
    currentSession = saved.sets || [];
    currentRoutine = saved.routine || DAY_ROUTINE[day] || 'Chest';
  } else {
    if (saved) clearSession(); // stale session from a previous day
    currentSession = [];
    currentRoutine = DAY_ROUTINE[day] || 'Chest';
  }
  renderLog();
}

function renderLog() {
  const { routines } = getData();
  const page = document.getElementById('page-log');

  const topPR = computeTopPR();
  const prLabel = topPR ? `${topPR.exercise.split(' ').pop()} PR` : 'Top PR';
  const prValue = topPR ? `${topPR.weight}` : '—';

  page.innerHTML = `
    <div class="stat-row">
      <div class="stat-chip">
        <div class="stat-value">${computeThisWeek()}<span style="font-size:14px;color:var(--text-muted)">/4</span></div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value">${computeStreak()}</div>
        <div class="stat-label">Streak (wks)</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value">${prValue}</div>
        <div class="stat-label">${prLabel}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Routine</div>
      <div class="pill-row" id="routinePills">
        ${Object.keys(routines).map(r => `
          <div class="pill ${r === currentRoutine ? 'active' : ''}" data-routine="${r}" onclick="selectRoutine(this.dataset.routine)">${r}</div>
        `).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-label">Exercise</div>
      <select class="select-field" id="exerciseSelect" onchange="onExerciseChange(this)">
        ${(routines[currentRoutine] || []).map(e => `<option value="${e}">${e}</option>`).join('')}
        <option value="__custom__">＋ Add Custom...</option>
      </select>
      <a id="formLinkBtn" href="" target="_blank" rel="noopener noreferrer" class="form-link-btn" style="display:none">ℹ️ Form Guide</a>
      <div id="customInputRow" style="display:none" class="custom-input-row">
        <input class="custom-input" id="customExName" placeholder="Exercise name..." />
      </div>
      <div class="input-row">
        <div id="weightGroup">
          <input class="input-field" id="inputWeight" placeholder="0" type="number" min="0" inputmode="decimal" />
          <span class="input-label">lbs</span>
        </div>
        <div>
          <input class="input-field" id="inputReps" placeholder="0" type="number" min="1" inputmode="numeric" />
          <span class="input-label">reps</span>
        </div>
        <div>
          <input class="input-field" id="inputSets" placeholder="1" type="number" min="1" inputmode="numeric" value="1" />
          <span class="input-label">sets</span>
        </div>
      </div>
      <button class="btn-primary" onclick="addSet()">+ Add Set</button>
    </div>

    ${currentSession.length > 0 ? buildSessionCard() : ''}
  `;
  updateWeightVisibility();
  updateFormLink();
}

function buildSessionCard() {
  const grouped = {};
  const groupOrder = [];
  currentSession.forEach((s, i) => {
    if (!grouped[s.exercise]) { grouped[s.exercise] = []; groupOrder.push(s.exercise); }
    grouped[s.exercise].push({ ...s, idx: i });
  });
  const rows = groupOrder.map(ex => {
    const safeEx = ex.replace(/[^a-z0-9]/gi, '_');
    const expanded = !sessionGroupCollapsed.has(safeEx);
    const setCount = grouped[ex].length;
    return `
    <div class="session-group ${expanded ? 'expanded' : ''}" id="sg-${safeEx}">
      <div class="session-group-header" onclick="toggleSessionGroup('${safeEx}')">
        <span>${ex} <span style="font-weight:400;opacity:0.7">(${setCount})</span></span>
        <span class="session-group-chevron">▼</span>
      </div>
      <div class="session-group-body">
        ${grouped[ex].map((s, j) => `
          <div class="set-row">
            <div class="set-dot"></div>
            <div class="set-name">Set ${j + 1}</div>
            <div class="set-meta">${s.bodyweight ? 'BW' : s.weight + ' lbs'} × ${s.reps} reps</div>
            <button class="set-delete" onclick="removeSet(${s.idx})">✕</button>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
  return `
    <div class="card" id="sessionCard">
      <div class="card-label">Today's Sets (${currentSession.length})</div>
      ${rows}
      <button class="btn-outline" onclick="finishWorkout()">✓ Finish Workout</button>
    </div>`;  
}

function updateWeightVisibility() {
  const sel = document.getElementById('exerciseSelect');
  const wg  = document.getElementById('weightGroup');
  if (!sel || !wg) return;
  wg.style.display = BODYWEIGHT_EXERCISES.has(sel.value) ? 'none' : '';
}

function updateFormLink() {
  const sel = document.getElementById('exerciseSelect');
  const btn = document.getElementById('formLinkBtn');
  if (!sel || !btn) return;
  const url = FORM_LINKS[sel.value];
  if (url) {
    btn.href = url;
    btn.style.display = '';
  } else {
    btn.style.display = 'none';
  }
}

function selectRoutine(name) {
  currentRoutine = name;
  renderLog();
}

function onExerciseChange(sel) {
  document.getElementById('customInputRow').style.display = sel.value === '__custom__' ? 'flex' : 'none';
  updateWeightVisibility();
  updateFormLink();
}

function addSet() {
  const sel = document.getElementById('exerciseSelect');
  let exercise = sel.value;
  if (exercise === '__custom__') {
    exercise = (document.getElementById('customExName')?.value || '').trim();
    if (!exercise) { showToast('Enter a custom exercise name'); return; }
  }
  const isBW   = BODYWEIGHT_EXERCISES.has(exercise);
  const weight = isBW ? 0 : parseFloat(document.getElementById('inputWeight').value);
  const reps   = parseInt(document.getElementById('inputReps').value);
  const sets   = parseInt(document.getElementById('inputSets').value) || 1;
  if ((!isBW && !weight) || !reps) { showToast('Enter weight and reps'); return; }
  for (let i = 0; i < sets; i++) currentSession.push({ exercise, weight, reps, bodyweight: isBW, routine: currentRoutine });
  saveSession();
  renderLog();
}

function removeSet(i) {
  currentSession.splice(i, 1);
  saveSession();
  renderLog();
}

function finishWorkout() {
  if (!currentSession.length) return;
  const { workouts } = getData();
  const usedRoutines = [...new Set(currentSession.map(s => s.routine).filter(Boolean))];
  const routineLabel = usedRoutines.length ? usedRoutines.join(' + ') : currentRoutine;
  workouts.unshift({
    id: generateId(),
    date: isoDate(new Date()),
    routine: routineLabel,
    sets: [...currentSession]
  });
  saveWorkouts(workouts);
  currentSession = [];
  clearSession();
  autoBackup(workouts);
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
  showToast(isIOS ? 'Saved! Tap Share → Save to Files to backup.' : 'Workout saved! Backup downloaded.');
  renderLog();
}

function autoBackup(workouts) {
  let csv = 'Date,Exercise,Weight,Reps\n';
  workouts.forEach(w => {
    w.sets.forEach(s => {
      csv += `${w.date},${s.exercise},${s.weight},${s.reps}\n`;
    });
  });
  const filename = `gymdash-backup-${isoDate(new Date())}.csv`;
  const blob = new Blob([csv], { type: 'text/csv' });

  // File System Access API — shows "Save As" dialog (Chrome Android/desktop)
  if (window.showSaveFilePicker) {
    window.showSaveFilePicker({
      suggestedName: filename,
      types: [{ description: 'CSV', accept: { 'text/csv': ['.csv'] } }]
    }).then(handle => handle.createWritable())
      .then(writable => writable.write(blob).then(() => writable.close()))
      .catch(() => {}); // user cancelled
    return;
  }

  // Native share sheet fallback (Android/iOS)
  const file = new File([blob], filename, { type: 'text/csv' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: 'GymDash Backup' }).catch(() => {});
    return;
  }

  // Last resort: direct download
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── HISTORY ──
let historyMonth = new Date();
let selectedHistoryDate = null;

function renderHistory() {
  const { workouts } = getData();
  const page = document.getElementById('page-history');

  const workoutDates = new Set(workouts.map(w => w.date));

  // Build calendar
  const y = historyMonth.getFullYear();
  const m = historyMonth.getMonth();
  const monthLabel = historyMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const firstDay = new Date(y, m, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const todayStr = isoDate(new Date());

  const dowHeaders = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d =>
    `<div class="cal-dow">${d}</div>`).join('');

  let dayCells = '';
  for (let i = 0; i < firstDay; i++) dayCells += `<div class="cal-day"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasWorkout = workoutDates.has(dateStr);
    const isSelected = dateStr === selectedHistoryDate;
    const isToday    = dateStr === todayStr;
    const classes = ['cal-day','in-month', hasWorkout?'has-workout':'', isSelected?'selected':'', isToday?'today':''].filter(Boolean).join(' ');
    const onclick  = hasWorkout ? `onclick="selectHistoryDay('${dateStr}')"` : '';
    dayCells += `<div class="${classes}" ${onclick}>${d}</div>`;
  }

  const calHtml = `
    <div class="cal-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="prevHistoryMonth()">&#8249;</button>
        <div class="cal-month-label">${monthLabel}</div>
        <button class="cal-nav" onclick="nextHistoryMonth()">&#8250;</button>
      </div>
      <div class="cal-grid">${dowHeaders}${dayCells}</div>
    </div>`;

  // Session detail area
  let sessionsHtml = '';
  if (selectedHistoryDate) {
    const w = workouts.find(w => w.date === selectedHistoryDate);
    if (w) {
      sessionsHtml = `<div class="section-heading">Session — ${parseIso(selectedHistoryDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
        ${buildSessionDetailCard(w, true)}`;
    }
  } else {
    if (!workouts.length) {
      sessionsHtml = `<p style="color:var(--text-muted);font-size:14px;padding:8px 0">No sessions logged yet.</p>`;
    } else {
      const recent = workouts.slice(0, 10);
      sessionsHtml = `<div class="section-heading">Recent Sessions</div>${recent.map(w => buildSessionDetailCard(w, false)).join('')}`;
    }
  }

  page.innerHTML = calHtml + sessionsHtml;
}

function buildSessionDetailCard(w, expanded) {
  const d = parseIso(w.date);
  const dateLabel = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  const exercises = [...new Set(w.sets.map(s => s.exercise))];
  const grouped = {};
  w.sets.forEach(s => {
    if (!grouped[s.exercise]) grouped[s.exercise] = [];
    grouped[s.exercise].push(s);
  });
  const detailHtml = Object.entries(grouped).map(([ex, sets]) => `
    <div class="detail-group">
      <div class="detail-group-name">${ex}</div>
      ${sets.map((s,i) => `
        <div class="detail-set-row">
          <span class="detail-set-label">Set ${i+1}</span>
          <span class="detail-set-val">${s.bodyweight ? 'BW' : s.weight + ' lbs'} × ${s.reps} reps</span>
        </div>
      `).join('')}
    </div>
  `).join('');
  return `
    <div class="session-card ${expanded?'expanded':''}" onclick="toggleSession(this)">
      <div class="session-header">
        <div class="session-date">${dateLabel}</div>
        <div class="session-badges">${(Array.isArray(w.routine)?w.routine:w.routine.split(' + ')).map(r=>`<div class="session-badge">${r}</div>`).join('')}</div>
      </div>
      <div class="session-tags">${exercises.map(e=>`<span class="session-tag">${e}</span>`).join('')}</div>
      <div class="session-detail">
        ${detailHtml}
        <button class="btn-outline" style="margin-top:12px;border-color:var(--primary);color:var(--primary)" onclick="event.stopPropagation();deleteWorkout('${w.id}')">&#128465; Delete Session</button>
      </div>
    </div>`;
}

function deleteWorkout(id) {
  if (!confirm('Delete this session? This cannot be undone.')) return;
  const { workouts } = getData();
  const updated = workouts.filter(w => w.id !== id);
  saveWorkouts(updated);
  if (selectedHistoryDate) {
    const still = updated.find(w => w.date === selectedHistoryDate);
    if (!still) selectedHistoryDate = null;
  }
  showToast('Session deleted.');
  renderHistory();
}

function prevHistoryMonth() {
  historyMonth = new Date(historyMonth.getFullYear(), historyMonth.getMonth() - 1, 1);
  selectedHistoryDate = null;
  renderHistory();
}
function nextHistoryMonth() {
  historyMonth = new Date(historyMonth.getFullYear(), historyMonth.getMonth() + 1, 1);
  selectedHistoryDate = null;
  renderHistory();
}
function selectHistoryDay(dateStr) {
  selectedHistoryDate = selectedHistoryDate === dateStr ? null : dateStr;
  renderHistory();
}

function toggleSession(card) {
  card.classList.toggle('expanded');
}

// ── PROGRESS ──
let chartMode = 'max';
let chartExercise = null;

function renderProgress() {
  const { workouts } = getData();
  const page = document.getElementById('page-progress');

  const prs = computePRs();
  if (!prs.length) {
    page.innerHTML = `<div class="section-heading">Personal Records</div>
      <p style="color:var(--text-muted);font-size:14px">No data yet. Log a workout to see your PRs.</p>`;
    return;
  }

  // Group PRs by routine
  const prByRoutine = {};
  const routineOrder = Object.keys(DEFAULT_ROUTINES);
  prs.forEach(p => {
    let bucket = 'Other';
    for (const [rName, exList] of Object.entries(DEFAULT_ROUTINES)) {
      if (exList.some(e => e.toLowerCase() === p.exercise.toLowerCase())) { bucket = rName; break; }
    }
    if (!prByRoutine[bucket]) prByRoutine[bucket] = [];
    prByRoutine[bucket].push(p);
  });

  const orderedGroups = [...routineOrder.filter(r => prByRoutine[r]), ...(prByRoutine['Other'] ? ['Other'] : [])];

  const groupHtml = orderedGroups.map(groupName => {
    const items = prByRoutine[groupName];
    const topMax = Math.max(...items.map(p => p.max));
    const rows = items.map(p => {
      let trendHtml = '';
      if (p.trend === null) trendHtml = `<div class="pr-trend">—</div>`;
      else if (p.trend > 0) trendHtml = `<div class="pr-trend up">↑ +${p.trend} lbs</div>`;
      else if (p.trend < 0) trendHtml = `<div class="pr-trend down">↓ ${p.trend} lbs</div>`;
      else trendHtml = `<div class="pr-trend">→ same</div>`;
      return `<div class="pr-row">
        <div class="pr-name">${p.exercise}</div>
        <div class="pr-right">
          <div class="pr-weight">${p.max} lbs</div>
          ${trendHtml}
        </div>
      </div>`;
    }).join('');
    const safeId = groupName.replace(/[^a-z]/gi,'_');
    return `
      <div class="pr-group" id="prg-${safeId}">
        <div class="pr-group-header" onclick="togglePRGroup('${safeId}')">
          <div class="pr-group-name">${groupName}</div>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="pr-group-meta">${items.length} exercise${items.length!==1?'s':''} · top ${topMax} lbs</div>
            <div class="pr-group-chevron">▼</div>
          </div>
        </div>
        <div class="pr-group-body">${rows}</div>
      </div>`;
  }).join('');

  const allExercises = [...new Set(workouts.flatMap(w => w.sets.map(s => s.exercise)))].sort();
  if (!chartExercise || !allExercises.includes(chartExercise)) chartExercise = allExercises[0];

  page.innerHTML = `
    <div class="section-heading">Personal Records</div>
    ${groupHtml}
    <div class="section-heading">Exercise Trend</div>
    <div class="card">
      <div class="chart-controls">
        <select class="select-field" id="chartExSelect" onchange="onChartExChange(this)" style="margin-bottom:0;flex:1">
          ${allExercises.map(e => `<option value="${e}" ${e===chartExercise?'selected':''}>${e}</option>`).join('')}
        </select>
        <div class="chart-toggle">
          <button class="chart-toggle-btn ${chartMode==='max'?'active':''}" onclick="setChartMode('max')">Max</button>
          <button class="chart-toggle-btn ${chartMode==='volume'?'active':''}" onclick="setChartMode('volume')">Vol</button>
        </div>
      </div>
      <canvas id="chart" height="200"></canvas>
    </div>
  `;
  drawChart();
}

function togglePRGroup(safeId) {
  document.getElementById('prg-' + safeId).classList.toggle('expanded');
}

function toggleSessionGroup(safeEx) {
  const el = document.getElementById('sg-' + safeEx);
  if (!el) return;
  const wasExpanded = el.classList.contains('expanded');
  if (wasExpanded) {
    sessionGroupCollapsed.add(safeEx);
    el.classList.remove('expanded');
  } else {
    sessionGroupCollapsed.delete(safeEx);
    el.classList.add('expanded');
  }
}

function onChartExChange(sel) {
  chartExercise = sel.value;
  drawChart();
}

function setChartMode(mode) {
  chartMode = mode;
  renderProgress();
}

function drawChart() {
  const canvas = document.getElementById('chart');
  if (!canvas) return;
  const data = getChartData(chartExercise, chartMode);
  if (!data.length) return;

  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = 200;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const PAD_L = 8, PAD_R = 8, PAD_T = 28, PAD_B = 28;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;

  const maxVal = Math.max(...data.map(d => d.value)) * 1.15;
  const peak   = Math.max(...data.map(d => d.value));
  const colW   = chartW / data.length;
  const barW   = colW * 0.38;
  const offset = (colW - barW) / 2;

  // Subtle horizontal grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  for (let g = 1; g <= 3; g++) {
    const gy = PAD_T + chartH - (g / 4) * chartH;
    ctx.beginPath();
    ctx.moveTo(PAD_L, gy);
    ctx.lineTo(W - PAD_R, gy);
    ctx.stroke();
  }

  data.forEach((d, i) => {
    const x   = PAD_L + i * colW + offset;
    const pct = d.value / maxVal;
    const bH  = Math.max(pct * chartH, 4);
    const y   = PAD_T + chartH - bH;

    ctx.fillStyle = d.value === peak ? '#F59E0B' : '#DC2626';
    ctx.beginPath();
    ctx.roundRect(x, y, barW, bH, [4, 4, 0, 0]);
    ctx.fill();

    ctx.fillStyle = d.value === peak ? '#F59E0B' : '#FAFAFA';
    ctx.font = `bold 10px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    const valLabel = chartMode === 'max'
      ? `${d.value}`
      : `${(d.value / 1000).toFixed(1)}k`;
    ctx.fillText(valLabel, x + barW / 2, y - 6);

    ctx.fillStyle = '#A3A3A3';
    ctx.font = `9px 'JetBrains Mono', monospace`;
    ctx.fillText(d.label, x + barW / 2, H - 6);
  });
}

// ── TROPHIES RENDER ──
function renderTrophies() {
  const page = document.getElementById('page-trophies');
  const trophies = computeTrophies();
  const earned = trophies.filter(t => t.earned);
  const pct = Math.round((earned.length / trophies.length) * 100);

  const TIER_COLORS = {
    bronze:  '#cd7f32',
    silver:  '#a8b0bf',
    gold:    '#f5c518',
    diamond: '#7dd3fc',
  };
  const TIER_LABEL = { bronze: 'Bronze', silver: 'Silver', gold: 'Gold', diamond: 'Diamond' };

  // Group by category using position in TROPHY_DEFS
  const GROUPS = [
    { label: 'First Steps',       ids: ['first_blood','iron_habit','centurion'] },
    { label: 'Consistency',       ids: ['three_peat','month_machine','relentless'] },
    { label: 'Lifting Milestones',ids: ['pr_hunter','plate_math','two_plates','three_plates'] },
    { label: 'Volume & Variety',  ids: ['grease_the_groove','tonnage','full_split','leg_day_lifer'] },
  ];

  const trophyMap = Object.fromEntries(trophies.map(t => [t.id, t]));

  const groupsHtml = GROUPS.map(g => {
    const cards = g.ids.map(id => {
      const t = trophyMap[id];
      if (!t) return '';
      const color = TIER_COLORS[t.tier];
      const earnedClass = t.earned ? 'earned' : 'locked';
      return `
        <div class="trophy-card ${earnedClass}" style="--trophy-color:${color}">
          <span class="trophy-tier-badge">${TIER_LABEL[t.tier]}</span>
          <div class="trophy-icon-wrap">
            <svg viewBox="0 0 24 24">${t.icon}</svg>
          </div>
          <div class="trophy-name">${t.name}</div>
          <div class="trophy-desc">${t.desc}</div>
        </div>`;
    }).join('');
    return `<div class="trophy-section-label">${g.label}</div><div class="trophy-grid">${cards}</div>`;
  }).join('');

  page.innerHTML = `
    <div class="trophy-summary">
      <div class="trophy-summary-count">${earned.length}</div>
      <div class="trophy-summary-text">
        <div class="trophy-summary-label">Trophies Earned</div>
        <div class="trophy-summary-sub">${trophies.length - earned.length} remaining to unlock</div>
        <div class="trophy-progress-bar">
          <div class="trophy-progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
    </div>
    ${groupsHtml}
  `;
}

// ── SETTINGS ──
let newRoutineExercises = [];

function renderSettings() {
  const { routines } = getData();
  const page = document.getElementById('page-settings');
  const isDefault = name => Object.prototype.hasOwnProperty.call(DEFAULT_ROUTINES, name);

  const routineCards = Object.entries(routines).map(([name, exercises]) => {
    const safeId = name.replace(/[^a-z]/gi,'_');
    const def = isDefault(name);
    return `
    <div class="routine-card" id="rc-${safeId}">
      <div class="routine-header" data-id="${safeId}" onclick="toggleRoutine(this.dataset.id)">
        <div style="display:flex;align-items:center;gap:4px">
          <div class="routine-name">${name}</div>
          ${def ? `<span class="routine-default-badge">default</span>` : ''}
        </div>
        <div style="display:flex;align-items:center">
          ${!def ? `<button class="routine-delete-btn" onclick="event.stopPropagation();deleteRoutine('${name}')" title="Delete routine">✕</button>` : ''}
          <div class="routine-chevron">▼</div>
        </div>
      </div>
      <div class="routine-body">
        ${exercises.map((e, i) => `
          <div class="routine-ex-row">
            <div class="routine-ex-name">${e}</div>
            <button class="routine-ex-delete" data-routine="${name}" data-idx="${i}" onclick="removeExercise(this.dataset.routine, +this.dataset.idx)">✕</button>
          </div>
        `).join('')}
        <div class="add-exercise-row" style="margin-top:12px">
          <input class="add-exercise-input" id="addEx-${safeId}" placeholder="New exercise name..." />
          <button class="btn-sm" data-routine="${name}" onclick="addExercise(this.dataset.routine)">Add</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const newRoutineForm = `
    <div class="new-routine-card" id="newRoutineForm" style="display:none">
      <div class="card-label">New Routine</div>
      <div class="new-routine-name-row">
        <input class="new-routine-name-input" id="newRoutineName" placeholder="Routine name..." />
      </div>
      <div class="new-routine-ex-list" id="newRoutineExList"></div>
      <div class="add-exercise-row" style="margin-bottom:12px">
        <input class="add-exercise-input" id="newRoutineExInput" placeholder="Add exercise..." onkeydown="if(event.key==='Enter')addNewRoutineEx()" />
        <button class="btn-sm" onclick="addNewRoutineEx()">Add</button>
      </div>
      <div class="new-routine-btn-row">
        <button class="btn-primary" style="flex:1" onclick="saveNewRoutine()">✓ Save Routine</button>
        <button class="btn-outline" style="margin-top:0;flex:1" onclick="cancelNewRoutine()">Cancel</button>
      </div>
    </div>`;

  page.innerHTML = `
    <div class="section-heading">Routines</div>
    ${newRoutineForm}
    ${routineCards}
    <button class="btn-outline" id="addRoutineBtn" onclick="showNewRoutineForm()" style="width:100%;margin-bottom:10px">＋ New Routine</button>
    <div class="section-heading" style="margin-top:8px">Theme</div>
    <div class="card">
      <div class="card-label">Color Theme</div>
      <div class="theme-grid">
        ${Object.entries(THEMES).map(([id, t]) => `
          <div class="theme-swatch ${localStorage.getItem('gymdash_theme')=== id || (!localStorage.getItem('gymdash_theme') && id==='noir') ? 'active' : ''}" onclick="setTheme('${id}')">
            <div class="theme-swatch-dot" style="background:${t.primary};border-color:${t.accent}"></div>
            <div class="theme-swatch-label">${t.name}${t.dark?'':' ☀'}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="section-heading" style="margin-top:8px">Data</div>
    <div class="card">
      <div class="card-label">Import / Export</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">CSV format: Date, Exercise, Weight, Reps</p>
      <div class="data-btn-row">
        <button class="btn-outline" onclick="triggerImport()" style="margin-top:0">⬆ Import CSV</button>
        <button class="btn-outline" onclick="exportCSV()" style="margin-top:0">⬇ Export CSV</button>
      </div>
      <input type="file" id="csvFileInput" style="display:none" onchange="handleImport(this)" />
    </div>
    <div class="section-heading" style="margin-top:8px">About</div>
    <div class="card">
      <div class="card-label">App Version</div>
      <p style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--primary);margin-top:6px">${APP_VERSION}</p>
    </div>
  `;
}

function toggleRoutine(id) {
  document.getElementById('rc-' + id).classList.toggle('expanded');
}

function removeExercise(routineName, idx) {
  const { routines } = getData();
  routines[routineName].splice(idx, 1);
  saveRoutines(routines);
  renderSettings();
}

function addExercise(routineName) {
  const key = routineName.replace(/[^a-z]/gi,'_');
  const input = document.getElementById('addEx-' + key);
  const name = (input?.value || '').trim();
  if (!name) return;
  const { routines } = getData();
  if (!routines[routineName].includes(name)) {
    routines[routineName].push(name);
    saveRoutines(routines);
    showToast(`Added "${name}" to ${routineName}`);
  }
  renderSettings();
}

function deleteRoutine(name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  const { routines } = getData();
  delete routines[name];
  saveRoutines(routines);
  // Reset currentRoutine if it was the deleted one
  if (currentRoutine === name) {
    currentRoutine = Object.keys(getData().routines)[0] || 'Chest';
  }
  showToast(`Deleted "${name}"`);
  renderSettings();
}

function showNewRoutineForm() {
  newRoutineExercises = [];
  document.getElementById('newRoutineForm').style.display = '';
  document.getElementById('addRoutineBtn').style.display = 'none';
  document.getElementById('newRoutineName').focus();
  renderNewRoutineChips();
}

function cancelNewRoutine() {
  newRoutineExercises = [];
  document.getElementById('newRoutineForm').style.display = 'none';
  document.getElementById('addRoutineBtn').style.display = '';
}

function addNewRoutineEx() {
  const input = document.getElementById('newRoutineExInput');
  const val = (input?.value || '').trim();
  if (!val) return;
  if (!newRoutineExercises.includes(val)) newRoutineExercises.push(val);
  input.value = '';
  input.focus();
  renderNewRoutineChips();
}

function removeNewRoutineEx(idx) {
  newRoutineExercises.splice(idx, 1);
  renderNewRoutineChips();
}

function renderNewRoutineChips() {
  const container = document.getElementById('newRoutineExList');
  if (!container) return;
  container.innerHTML = newRoutineExercises.map((ex, i) => `
    <span class="new-routine-ex-chip">
      ${ex}
      <button onclick="removeNewRoutineEx(${i})">✕</button>
    </span>`).join('');
}

function saveNewRoutine() {
  const name = (document.getElementById('newRoutineName')?.value || '').trim();
  if (!name) { showToast('Enter a routine name'); return; }
  if (!newRoutineExercises.length) { showToast('Add at least one exercise'); return; }
  const { routines } = getData();
  if (routines[name]) { showToast('A routine with that name already exists'); return; }
  routines[name] = [...newRoutineExercises];
  saveRoutines(routines);
  showToast(`"${name}" saved!`);
  newRoutineExercises = [];
  renderSettings();
  renderLog(); // so new routine appears in Log pill row immediately
}

function triggerImport() {
  if (window.showOpenFilePicker) {
    window.showOpenFilePicker({ multiple: false })
      .then(async ([handle]) => {
        const file = await handle.getFile();
        const text = await file.text();
        processImportText(text);
      }).catch(() => {});
  } else {
    document.getElementById('csvFileInput').click();
  }
}

function exportCSV() {
  const { workouts } = getData();
  let csv = 'Date,Exercise,Weight,Reps\n';
  workouts.forEach(w => {
    w.sets.forEach(s => {
      csv += `${w.date},${s.exercise},${s.weight},${s.reps}\n`;
    });
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'workouts.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── CSV IMPORT ──
function inferRoutine(exercises) {
  const counts = Object.entries(DEFAULT_ROUTINES).map(([routine, exList]) => ({
    routine,
    count: exercises.filter(e => exList.some(r => e.toLowerCase().includes(r.toLowerCase()))).length
  }));
  counts.sort((a,b) => b.count - a.count);
  return counts[0].count > 0 ? counts[0].routine : 'Other';
}

function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { processImportText(e.target.result); input.value = ''; };
  reader.readAsText(file);
}

function processImportText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const header = lines[0].toLowerCase();
  const dataLines = header.includes('date') ? lines.slice(1) : lines;

  const rawSessions = {};
  let skipped = 0;

  dataLines.forEach(line => {
    const parts = line.split(',');
    if (parts.length < 4) { skipped++; return; }
    const [rawDate, exercise, rawWeight, rawReps] = parts.map(p => p.trim());
    const d = parseIso(rawDate);
    if (!d || isNaN(d.getTime())) { skipped++; return; }
    const weight = parseFloat(rawWeight);
    const reps   = parseInt(rawReps);
    if (isNaN(weight) || isNaN(reps)) { skipped++; return; }
    const dateKey = isoDate(d);
    if (!rawSessions[dateKey]) rawSessions[dateKey] = [];
    rawSessions[dateKey].push({ exercise, weight, reps });
  });

  const { workouts } = getData();
  const existingDates = new Set(workouts.map(w => w.date));
  let imported = 0;

  Object.entries(rawSessions).forEach(([date, sets]) => {
    if (existingDates.has(date)) { skipped += sets.length; return; }
    const routine = inferRoutine(sets.map(s => s.exercise));
    workouts.push({ id: generateId(), date, routine, sets });
    imported++;
  });

  workouts.sort((a,b) => parseIso(b.date) - parseIso(a.date));
  saveWorkouts(workouts);

  showToast(`Imported ${imported} sessions. Skipped ${skipped} rows.`);
  renderLog();
}

if ('serviceWorker' in navigator) {

    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

initTheme();
