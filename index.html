<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#DC2626" />
<link rel="manifest" href="manifest.json" />
<title>GymDash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #0A0A0A;
  --surface:      #171717;
  --surface2:     #222222;
  --primary:      #DC2626;
  --primary-dim:  rgba(220,38,38,0.15);
  --accent:       #F59E0B;
  --text:         #FAFAFA;
  --text-muted:   #A3A3A3;
  --border:       #2A2A2A;
  --green:        #22C55E;
}

/* ── THEME SWATCHES ── */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 8px;
}
.theme-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 8px 4px;
  border-radius: 12px;
  border: 2px solid transparent;
  transition: border-color 0.15s;
}
.theme-swatch.active { border-color: var(--primary); }
.theme-swatch-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.1);
}
.theme-swatch-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  text-align: center;
}
.theme-swatch.active .theme-swatch-label { color: var(--text); }

body {
  font-family: 'Raleway', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 12px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid var(--border);
}
.topbar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
}
.topbar-title span { color: var(--primary); }
.topbar-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.topbar-gear {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.topbar-gear:active, .topbar-gear.active { color: var(--primary); }

/* ── PAGES ── */
.page { display: none; flex: 1; overflow-y: auto; padding: 16px 16px 96px; }
.page.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.section-heading {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 12px;
  margin-top: 4px;
}

/* ── STAT CHIPS ── */
.stat-row { display: flex; gap: 10px; margin-bottom: 12px; }
.stat-chip {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 8px;
  text-align: center;
}
.stat-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* ── PILLS ── */
.pill-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.pill-row::-webkit-scrollbar { display: none; }
/* Show a thin scrollbar on pointer/mouse devices (Windows browser) */
@media (pointer: fine) {
  .pill-row { scrollbar-width: thin; scrollbar-color: var(--primary) var(--surface2); padding-bottom: 6px; }
  .pill-row::-webkit-scrollbar { display: block; height: 4px; }
  .pill-row::-webkit-scrollbar-track { background: var(--surface2); border-radius: 2px; }
  .pill-row::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }
}
.pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill.active { background: var(--primary); color: white; border-color: var(--primary); }

/* ── FORM ELEMENTS ── */
.select-field {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
  font-weight: 500;
  appearance: none;
  cursor: pointer;
  margin-bottom: 10px;
}
.select-field:focus { outline: none; border-color: var(--primary); }

/* Form guide link */
.form-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  transition: opacity 0.15s;
}
.form-link-btn:hover { opacity: 0.75; }

.input-row { display: flex; gap: 8px; margin-top: 10px; }
.input-row > div { flex: 1; min-width: 0; }
.input-field {
  width: 100%;
  min-width: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 6px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  text-align: center;
}
.input-field::placeholder { color: var(--text-muted); }
.input-field:focus { outline: none; border-color: var(--primary); }

.input-label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 4px;
}

/* ── BUTTONS ── */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Raleway', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  margin-top: 10px;
  transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.85; }

.btn-outline {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 14px;
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.15s;
}
.btn-outline:active { border-color: var(--primary); color: var(--primary); }

.btn-sm {
  padding: 6px 12px;
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Raleway', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-sm:active { border-color: var(--primary); color: var(--primary); }

/* ── SET ROWS ── */
.set-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.set-row:last-of-type { border-bottom: none; }
.set-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
.set-name {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.set-meta { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; }
.set-delete {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  flex-shrink: 0;
  line-height: 1;
  font-size: 16px;
  transition: color 0.15s;
}
.set-delete:active { color: var(--primary); }

/* ── SESSION GROUP (TODAY'S SETS) ── */
.session-group { margin-bottom: 8px; }
.session-group:last-of-type { margin-bottom: 0; }
.session-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  padding: 8px 0 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
  cursor: pointer;
  user-select: none;
}
.session-group-chevron { font-size: 10px; transition: transform 0.2s; }
.session-group.expanded .session-group-chevron { transform: rotate(180deg); }
.session-group-body { display: none; }
.session-group.expanded .session-group-body { display: block; }

/* ── TROPHIES ── */
.trophy-summary {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}
.trophy-summary-count {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  line-height: 1;
  color: var(--primary);
  min-width: 56px;
  text-align: center;
}
.trophy-summary-text { flex: 1; }
.trophy-summary-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
}
.trophy-summary-sub {
  font-size: 13px;
  color: var(--text);
  margin-top: 2px;
}
.trophy-progress-bar {
  width: 100%;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.trophy-progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.trophy-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.trophy-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 8px;
  position: relative;
  transition: transform 0.2s;
  overflow: hidden;
}
.trophy-card.earned { border-color: var(--trophy-color, var(--primary)); }
.trophy-card.earned::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--trophy-color, var(--primary));
  opacity: 0.06;
}
.trophy-icon-wrap {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.trophy-card.earned .trophy-icon-wrap {
  background: color-mix(in srgb, var(--trophy-color, var(--primary)) 15%, var(--surface));
  border-color: var(--trophy-color, var(--primary));
}
.trophy-icon-wrap svg {
  width: 22px;
  height: 22px;
  stroke: var(--text-muted);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.trophy-card.earned .trophy-icon-wrap svg { stroke: var(--trophy-color, var(--primary)); }
.trophy-tier-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text-muted);
}
.trophy-card.earned .trophy-tier-badge {
  background: color-mix(in srgb, var(--trophy-color, var(--primary)) 20%, var(--surface));
  color: var(--trophy-color, var(--primary));
}
.trophy-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 0.5px;
  color: var(--text);
  line-height: 1.1;
}
.trophy-card.locked .trophy-name { color: var(--text-muted); }
.trophy-desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
}
.trophy-card.locked {
  opacity: 0.55;
  filter: grayscale(0.4);
}
.trophy-section-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  padding: 8px 0 4px;
}

/* ── SESSION CARDS (HISTORY) ── */
.session-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
}
.session-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.session-badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; max-width: 60%; }
.session-date { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }
.session-badge {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  background: var(--primary-dim);
  padding: 4px 10px;
  border-radius: 50px;
}
.session-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.session-tag {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--surface2);
  padding: 4px 10px;
  border-radius: 50px;
  border: 1px solid var(--border);
}
.session-detail { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: none; }
.session-card.expanded .session-detail { display: block; }
.detail-group { margin-bottom: 10px; }
.detail-group-name {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  margin-bottom: 6px;
}
.detail-set-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.detail-set-row:last-child { border-bottom: none; }
.detail-set-label { color: var(--text-muted); }
.detail-set-val { font-family: 'JetBrains Mono', monospace; color: var(--text); font-size: 12px; }

/* ── PR ROWS (PROGRESS) ── */
.pr-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.pr-row:last-child { border-bottom: none; }
.pr-name { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-mid { flex-shrink: 0; }
.pr-right { text-align: right; flex-shrink: 0; min-width: 64px; }
.pr-weight { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); line-height: 1; }
.pr-trend { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.pr-trend.up { color: var(--green); }
.pr-trend.down { color: var(--primary); }
.pr-sparkline { display: block; }

/* ── 1RM PANEL ── */
.orm-row {
  display: flex;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.orm-row:last-child { border-bottom: none; }
.orm-rank { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); width: 20px; flex-shrink: 0; }
.orm-name { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.orm-right { text-align: right; flex-shrink: 0; }
.orm-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--primary); line-height: 1; }
.orm-source { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

/* ── VOLUME CHART ── */
.vol-chart-wrap { width: 100%; }
canvas.volume-canvas { width: 100%; display: block; }
canvas#chart { width: 100%; border-radius: 12px; display: block; }
.chart-controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
.chart-toggle { display: flex; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; }
.chart-toggle-btn {
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 700;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.chart-toggle-btn.active { background: var(--primary); color: white; }

/* ── SETTINGS ── */
.routine-card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 10px;
  overflow: hidden;
}
.routine-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
}
.routine-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }
.routine-chevron {
  color: var(--text-muted);
  transition: transform 0.2s;
  font-size: 14px;
}
.routine-card.expanded .routine-chevron { transform: rotate(180deg); }
.routine-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.routine-card.expanded .routine-body { display: block; }
.routine-ex-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.routine-ex-row:last-of-type { border-bottom: none; }
.routine-ex-name { flex: 1; font-size: 14px; font-weight: 500; }
.routine-ex-delete {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  transition: color 0.15s;
}
.routine-ex-delete:active { color: var(--primary); }
.add-exercise-row { display: flex; gap: 8px; margin-top: 10px; }
.add-exercise-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: 13px;
}
.add-exercise-input:focus { outline: none; border-color: var(--primary); }

.data-btn-row { display: flex; gap: 10px; margin-top: 10px; }
.data-btn-row .btn-outline { margin-top: 0; }

/* ── COLLAPSIBLE SETTINGS SECTIONS ── */
.settings-section { margin-bottom: 4px; }
.settings-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 4px 0 12px;
  margin-top: 8px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.settings-section-header .section-heading { margin-bottom: 0; margin-top: 0; }
.settings-section-chevron {
  color: var(--text-muted);
  font-size: 14px;
  transition: transform 0.2s;
}
.settings-section.expanded .settings-section-chevron { transform: rotate(180deg); }
.settings-section-body { display: none; }
.settings-section.expanded .settings-section-body { display: block; }

/* ── NEW ROUTINE FORM ── */
.new-routine-card {
  background: var(--surface);
  border: 1px dashed var(--primary);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 10px;
}
.new-routine-card .card-label { margin-bottom: 10px; color: var(--primary); }
.new-routine-name-row { display: flex; gap: 8px; margin-bottom: 10px; }
.new-routine-name-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
  font-weight: 600;
}
.new-routine-name-input:focus { outline: none; border-color: var(--primary); }
.new-routine-ex-list { margin-bottom: 10px; }
.new-routine-ex-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  margin: 3px 3px 3px 0;
}
.new-routine-ex-chip button {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  padding: 0;
  line-height: 1;
}
.routine-delete-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  padding: 4px 6px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  margin-left: 4px;
}
.routine-delete-btn:active { color: #ef4444; background: rgba(239,68,68,0.1); }
.routine-default-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 7px;
  margin-left: 8px;
  align-self: center;
}
.new-routine-btn-row { display: flex; gap: 8px; margin-top: 4px; }

/* ── THEME SWATCHES ── */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 8px;
}
.theme-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 8px 4px;
  border-radius: 12px;
  border: 2px solid transparent;
  transition: border-color 0.15s;
}
.theme-swatch.active { border-color: var(--primary); }
.theme-swatch-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 3px solid rgba(128,128,128,0.2);
}
.theme-swatch-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  text-align: center;
}
.theme-swatch.active .theme-swatch-label { color: var(--text); }

/* ── CUSTOM EXERCISE INLINE ── */
.custom-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.custom-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--primary);
  border-radius: 12px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Raleway', sans-serif;
  font-size: 14px;
}
.custom-input:focus { outline: none; }

/* ── CALENDAR (HISTORY) ── */
.cal-wrap { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 14px; margin-bottom: 12px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-month-label { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }
.cal-nav { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; padding: 2px 8px; line-height: 1; transition: color 0.15s; }
.cal-nav:hover { color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow { font-size: 9px; font-weight: 700; text-align: center; color: var(--text-muted); padding: 4px 0; text-transform: uppercase; letter-spacing: 0.5px; }
.cal-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-size: 12px;
  position: relative;
  cursor: default;
  color: var(--text-muted);
}
.cal-day.in-month { color: var(--text); }
.cal-day.has-workout { background: var(--primary-dim); color: var(--primary); font-weight: 700; cursor: pointer; }
.cal-day.selected { background: var(--primary); color: #fff; font-weight: 700; }
.cal-day.today:not(.selected) { border: 1px solid var(--border); }

/* ── PR GROUPS (PROGRESS) ── */
.pr-group { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
.pr-group-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
.pr-group-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; }
.pr-group-meta { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
.pr-group-chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 14px; margin-left: 8px; }
.pr-group.expanded .pr-group-chevron { transform: rotate(180deg); }
.pr-group-body { display: none; padding: 0 16px 12px; border-top: 1px solid var(--border); }
.pr-group.expanded .pr-group-body { display: block; }

/* ── GOALS ── */
.goal-card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 10px;
}
.goal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
.goal-exercise { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; line-height: 1.1; }
.goal-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.goal-stats { display: flex; gap: 16px; margin-bottom: 12px; }
.goal-stat { display: flex; flex-direction: column; gap: 2px; }
.goal-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; line-height: 1; }
.goal-stat-val.current { color: var(--primary); }
.goal-stat-val.target  { color: var(--accent); }
.goal-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-family: 'Raleway', sans-serif; font-weight: 700; }
.goal-progress-track {
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}
.goal-progress-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transition: width 0.4s ease;
}
.goal-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
.goal-mini-chart { margin-top: 4px; }
.goal-deadline-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
  background: var(--surface2);
  border-radius: 20px;
  padding: 3px 8px;
  margin-top: 4px;
}
.goal-deadline-badge.soon { color: var(--accent); }
.goal-deadline-badge.overdue { color: var(--primary); }
.goal-form-card {
  background: var(--surface2);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  display: none;
}
.goal-form-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-end; }
.goal-form-row .add-exercise-input { flex: 1; }
.goal-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; line-height: 1.6; }
.goal-empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
.nutri-daily-card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-bottom: 10px;
  padding: 0 16px;
}
.nutri-row {
  display: flex;
  align-items: center;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.nutri-row:last-child { border-bottom: none; }
.nutri-label { flex: 1; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.nutri-counter { display: flex; align-items: center; gap: 8px; }
.nutri-count-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.nutri-count-btn:active { background: var(--primary-dim); }
.nutri-count-value { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; min-width: 32px; text-align: center; }
.nutri-unit { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.nutri-number-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  width: 80px;
  text-align: center;
}
.nutri-number-input:focus { outline: none; border-color: var(--primary); }
.nutri-toggle-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  font-family: 'Raleway', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.nutri-toggle-btn.active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }
.nutri-chart-card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 14px 16px;
  margin-bottom: 10px;
}
.nutri-chart-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
.nutri-metric-pills { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; flex: 1; }
.nutri-metric-pills::-webkit-scrollbar { display: none; }
.nutri-metric-pill {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Raleway', sans-serif;
  transition: all 0.15s;
}
.nutri-metric-pill.active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }
.nutri-range-toggle { display: flex; background: var(--surface2); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.nutri-range-btn {
  padding: 6px 10px;
  border: none; background: none;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.nutri-range-btn.active { background: var(--primary); color: #fff; }
.nutri-custom-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.nutri-custom-item:last-of-type { border-bottom: none; }
.nutri-custom-form {
  background: var(--surface2);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
}
.nutri-type-row { display: flex; gap: 6px; margin: 10px 0; flex-wrap: wrap; }
.nutri-type-btn {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  font-family: 'Raleway', sans-serif;
}
.nutri-type-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
  pointer-events: none;
  max-width: 90%;
}
.toast.show { opacity: 1; }

/* ── BOTTOM NAV ── */
.bottomnav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 12px;
  cursor: pointer;
  color: var(--text-muted);
  border: none;
  background: none;
  gap: 3px;
  transition: color 0.15s;
}
.nav-tab.active { color: var(--primary); }
.nav-icon { width: 20px; height: 20px; }
.nav-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'Raleway', sans-serif; }
</style>
</head>
<body>

<script>
// ── VERSION ──
// REMINDER: Run .\bump-version.ps1 before making any significant changes.
const APP_VERSION = 'v1.10';

// ── THEMES ──
const THEMES = {
  noir:     { name:'Noir',     dark:true,  primary:'#DC2626', primaryDim:'rgba(220,38,38,0.15)',  accent:'#F59E0B', bg:'#0A0A0A', surface:'#171717', surface2:'#222222', text:'#FAFAFA', textMuted:'#A3A3A3', border:'#2A2A2A' },
  ocean:    { name:'Ocean',    dark:true,  primary:'#0EA5E9', primaryDim:'rgba(14,165,233,0.15)', accent:'#14B8A6', bg:'#040F1A', surface:'#0C1E2E', surface2:'#132840', text:'#F0F9FF', textMuted:'#7BBFD4', border:'#1E3448' },
  forest:   { name:'Forest',   dark:true,  primary:'#22C55E', primaryDim:'rgba(34,197,94,0.15)',  accent:'#84CC16', bg:'#030F07', surface:'#0A1F0E', surface2:'#112914', text:'#F0FFF4', textMuted:'#6BBF85', border:'#1A3D22' },
  sunset:   { name:'Sunset',   dark:true,  primary:'#F97316', primaryDim:'rgba(249,115,22,0.15)', accent:'#EC4899', bg:'#0F0805', surface:'#1E120A', surface2:'#2A1A10', text:'#FFF7ED', textMuted:'#C4916A', border:'#3D2415' },
  midnight: { name:'Midnight', dark:true,  primary:'#8B5CF6', primaryDim:'rgba(139,92,246,0.15)',accent:'#6366F1', bg:'#05030F', surface:'#0E0A1E', surface2:'#160E2A', text:'#FAF5FF', textMuted:'#A08DC4', border:'#231848' },
  steel:    { name:'Steel',    dark:true,  primary:'#3B82F6', primaryDim:'rgba(59,130,246,0.15)', accent:'#94A3B8', bg:'#050810', surface:'#0D1120', surface2:'#141A2E', text:'#F8FAFC', textMuted:'#7C93B0', border:'#1E2A42' },
  clean:    { name:'Clean',    dark:false, primary:'#DC2626', primaryDim:'rgba(220,38,38,0.12)',  accent:'#D97706', bg:'#F5F5F5', surface:'#FFFFFF', surface2:'#F0F0F0', text:'#111111', textMuted:'#737373', border:'#E5E5E5' },
  sky:      { name:'Sky',      dark:false, primary:'#0284C7', primaryDim:'rgba(2,132,199,0.12)',  accent:'#0D9488', bg:'#F0F9FF', surface:'#FFFFFF', surface2:'#E0F2FE', text:'#0C1A26', textMuted:'#5A8FAA', border:'#BAE6FD' },
};

function applyTheme(id) {
  const t = THEMES[id] || THEMES.noir;
  const r = document.documentElement.style;
  r.setProperty('--bg',          t.bg);
  r.setProperty('--surface',     t.surface);
  r.setProperty('--surface2',    t.surface2);
  r.setProperty('--primary',     t.primary);
  r.setProperty('--primary-dim', t.primaryDim);
  r.setProperty('--accent',      t.accent);
  r.setProperty('--text',        t.text);
  r.setProperty('--text-muted',  t.textMuted);
  r.setProperty('--border',      t.border);
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', t.primary);
  localStorage.setItem('gymdash_theme', id);
}

function initTheme() {
  const saved = localStorage.getItem('gymdash_theme') || 'noir';
  applyTheme(saved);
}

function setTheme(id) {
  applyTheme(id);
  renderSettings();
  showToast(`Theme: ${THEMES[id]?.name || id}`);
}

// ── TAB SWITCHING ──
let _prevTabState = null;

function switchTab(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('topbarGear').classList.remove('active');
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'history')   renderHistory();
  if (name === 'progress')  renderProgress();
  if (name === 'trophies')  renderTrophies();
  if (name === 'goals')     renderGoals();
  if (name === 'nutrition') renderNutrition();
}

function openSettings() {
  const gear = document.getElementById('topbarGear');
  if (gear.classList.contains('active')) {
    // Toggle back to the tab the user came from
    if (_prevTabState) {
      switchTab(_prevTabState.name, _prevTabState.el);
    } else {
      const logBtn = document.querySelector('.nav-tab');
      switchTab('log', logBtn);
    }
    return;
  }
  // Capture current tab before switching to settings
  const activeTab  = document.querySelector('.nav-tab.active');
  const activePage = document.querySelector('.page.active');
  _prevTabState = (activeTab && activePage)
    ? { name: activePage.id.replace('page-', ''), el: activeTab }
    : null;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-settings').classList.add('active');
  gear.classList.add('active');
  renderSettings();
}

function computeStreakFromWorkouts(workouts) {
  if (!workouts.length) return 0;
  const weeks = new Set(workouts.map(w => {
    const d = parseIso(w.date);
    const jan1 = new Date(d.getFullYear(), 0, 1);
    return d.getFullYear() + '-' + Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  }));
  const sorted = [...weeks].sort();
  let streak = 1, best = 1;
  for (let i = 1; i < sorted.length; i++) {
    const [y1, w1] = sorted[i-1].split('-').map(Number);
    const [y2, w2] = sorted[i].split('-').map(Number);
    const consecutive = (y1 === y2 && w2 === w1 + 1) || (y2 === y1 + 1 && w1 >= 52 && w2 === 1);
    if (consecutive) { streak++; best = Math.max(best, streak); } else streak = 1;
  }
  return best;
}

// ── STORAGE ──
function getData() {
  const workouts = JSON.parse(localStorage.getItem('gymdash_workouts') || '[]');
  let routines   = JSON.parse(localStorage.getItem('gymdash_routines') || 'null') || DEFAULT_ROUTINES;
  // Merge any new default routines not yet saved
  let changed = false;
  Object.entries(DEFAULT_ROUTINES).forEach(([name, exercises]) => {
    if (!routines[name]) { routines[name] = exercises; changed = true; }
  });
  if (changed) saveRoutines(routines);
  return { workouts, routines };
}
function saveWorkouts(arr) { localStorage.setItem('gymdash_workouts', JSON.stringify(arr)); }
function saveRoutines(obj) { localStorage.setItem('gymdash_routines', JSON.stringify(obj)); }
function saveSession()     { localStorage.setItem('gymdash_session',  JSON.stringify({ sets: currentSession, routine: currentRoutine, date: isoDate(new Date()) })); }
function clearSession()    { localStorage.removeItem('gymdash_session'); }

// ── WEEK HELPERS ──
function getWeekBounds(date) {
  const d = new Date(date);
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - ((day + 6) % 7)); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  return { mon, sun };
}
function isoDate(d) { return d.toISOString().slice(0,10); }
function parseIso(str) {
  if (!str) return null;
  if (str.includes('/')) {
    const [m,d,y] = str.split('/');
    return new Date(+y, +m-1, +d);
  }
  const [y,m,d] = str.split('-');
  return new Date(+y, +m-1, +d);
}

// ── COMPUTED STATS ──
function computeThisWeek() {
  const { workouts } = getData();
  const { mon, sun } = getWeekBounds(new Date());
  return workouts.filter(w => {
    const d = parseIso(w.date);
    return d >= mon && d <= sun;
  }).length;
}

function computeStreak() {
  const { workouts } = getData();
  if (!workouts.length) return 0;
  let streak = 0;
  let checkDate = new Date();
  for (let i = 0; i < 52; i++) {
    const { mon, sun } = getWeekBounds(checkDate);
    const count = workouts.filter(w => {
      const d = parseIso(w.date);
      return d >= mon && d <= sun;
    }).length;
    if (count >= 4) { streak++; checkDate = new Date(mon); checkDate.setDate(mon.getDate() - 1); }
    else break;
  }
  return streak;
}

function computeTopPR() {
  const { workouts } = getData();
  let best = null;
  workouts.forEach(w => {
    w.sets.forEach(s => {
      if (!best || s.weight > best.weight) best = { exercise: s.exercise, weight: s.weight };
    });
  });
  return best;
}

function computePRs() {
  const { workouts } = getData();
  const prMap = {};
  const sorted = [...workouts].sort((a,b) => parseIso(a.date) - parseIso(b.date));
  const exSessions = {};
  sorted.forEach(w => {
    w.sets.forEach(s => {
      if (s.bodyweight) return;
      if (!prMap[s.exercise] || s.weight > prMap[s.exercise].max) {
        prMap[s.exercise] = { max: s.weight, prev: prMap[s.exercise]?.max || null };
      }
    });
    const exInSession = {};
    w.sets.forEach(s => {
      if (s.bodyweight) return;
      if (!exInSession[s.exercise] || s.weight > exInSession[s.exercise]) exInSession[s.exercise] = s.weight;
    });
    Object.entries(exInSession).forEach(([ex, wt]) => {
      if (!exSessions[ex]) exSessions[ex] = [];
      exSessions[ex].push(wt);
    });
  });
  return Object.entries(prMap).map(([exercise, { max }]) => {
    const sessions = exSessions[exercise] || [];
    const last = sessions[sessions.length - 1] || 0;
    const prev = sessions[sessions.length - 2] || null;
    const trend = prev === null ? null : last - prev;
    return { exercise, max, trend, sessionHistory: sessions };
  }).sort((a,b) => b.max - a.max);
}

function getChartData(exercise, mode) {
  const { workouts } = getData();
  const sessions = workouts
    .filter(w => w.sets.some(s => s.exercise === exercise))
    .sort((a,b) => parseIso(a.date) - parseIso(b.date))
    .slice(-8);
  return sessions.map(w => {
    const sets = w.sets.filter(s => s.exercise === exercise);
    const value = mode === 'max'
      ? Math.max(...sets.map(s => s.weight))
      : sets.reduce((sum, s) => sum + s.weight * s.reps, 0);
    const d = parseIso(w.date);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    return { label, value };
  });
}

// Epley 1RM estimate: best set per exercise = highest (weight * (1 + reps/30))
function computeEstimated1RMs() {
  const { workouts } = getData();
  const bestMap = {}; // exercise -> { orm, weight, reps }
  workouts.forEach(w => {
    w.sets.forEach(s => {
      if (s.bodyweight || !s.weight || !s.reps) return;
      const orm = s.weight * (1 + s.reps / 30);
      if (!bestMap[s.exercise] || orm > bestMap[s.exercise].orm) {
        bestMap[s.exercise] = { orm, weight: s.weight, reps: s.reps };
      }
    });
  });
  return Object.entries(bestMap)
    .map(([exercise, { orm, weight, reps }]) => ({ exercise, orm: Math.round(orm), weight, reps }))
    .sort((a, b) => b.orm - a.orm);
}

// Weekly volume: total lbs lifted per week for last 12 weeks
function computeWeeklyVolume() {
  const { workouts } = getData();
  const weekMap = {};
  const today = new Date(); today.setHours(0,0,0,0);
  workouts.forEach(w => {
    const d = parseIso(w.date);
    const msAgo = today - d;
    const weeksAgo = Math.floor(msAgo / (7 * 86400000));
    if (weeksAgo < 0 || weeksAgo >= 12) return;
    const key = weeksAgo;
    const vol = w.sets.reduce((sum, s) => sum + (!s.bodyweight && s.weight && s.reps ? s.weight * s.reps : 0), 0);
    weekMap[key] = (weekMap[key] || 0) + vol;
  });
  // Build 12 buckets newest→oldest, label as week offset
  const result = [];
  for (let i = 11; i >= 0; i--) {
    const wkStart = new Date(today.getTime() - (i + 1) * 7 * 86400000 + 86400000);
    const label = i === 0 ? 'This wk' : `${i}w ago`;
    result.push({ label, value: weekMap[i] || 0, weeksAgo: i });
  }
  return result;
}

function generateId() {

function addSet() {
  const sel = document.getElementById('exerciseSelect');
  let exercise = sel.value;
  if (exercise === '__custom__') {
    exercise = (document.getElementById('customExName')?.value || '').trim();
    if (!exercise) { showToast('Enter a custom exercise name'); return; }
  }
  const isBW   = BODYWEIGHT_EXERCISES.has(exercise);

function finishWorkout() {
  if (!currentSession.length) return;
  const { workouts } = getData();
  const usedRoutines = [...new Set(currentSession.map(s => s.routine).filter(Boolean))];
  const routineLabel = usedRoutines.length ? usedRoutines.join(' + ') : currentRoutine;
  workouts.unshift({
    id: generateId(),
    date: isoDate(new Date()),
    routine: routineLabel,
    sets: [...currentSession]
  });
  saveWorkouts(workouts);
  currentSession = [];
  clearSession();
  autoBackup(workouts);
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
  showToast(isIOS ? 'Saved! Tap Share → Save to Files to backup.' : 'Workout saved! Backup downloaded.');
  renderLog();
}

function autoBackup(workouts) {
  let csv = 'Date,Exercise,Weight,Reps\n';
  workouts.forEach(w => {
    w.sets.forEach(s => {
      csv += `${w.date},${s.exercise},${s.weight},${s.reps}\n`;
    });
  });
  const filename = `gymdash-backup-${isoDate(new Date())}.csv`;
  const blob = new Blob([csv], { type: 'text/csv' });

  // File System Access API — shows "Save As" dialog (Chrome Android/desktop)
  if (window.showSaveFilePicker) {
    window.showSaveFilePicker({
      suggestedName: filename,
      types: [{ description: 'CSV', accept: { 'text/csv': ['.csv'] } }]
    }).then(handle => handle.createWritable())
      .then(writable => writable.write(blob).then(() => writable.close()))
      .catch(() => {}); // user cancelled
    return;
  }

  // Native share sheet fallback (Android/iOS)
  const file = new File([blob], filename, { type: 'text/csv' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: 'GymDash Backup' }).catch(() => {});
    return;
  }

  // Last resort: direct download
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  const y = historyMonth.getFullYear();

  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const todayStr = isoDate(new Date());

  const dowHeaders = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d =>
    `<div class="cal-dow">${d}</div>`).join('');

  let dayCells = '';
  for (let i = 0; i < firstDay; i++) dayCells += `<div class="cal-day"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasWorkout = workoutDates.has(dateStr);
    const isSelected = dateStr === selectedHistoryDate;
    const isToday    = dateStr === todayStr;
    const classes = ['cal-day','in-month', hasWorkout?'has-workout':'', isSelected?'selected':'', isToday?'today':''].filter(Boolean).join(' ');
    const onclick  = hasWorkout ? `onclick="selectHistoryDay('${dateStr}')"` : '';

  }

  const calHtml = `
    <div class="cal-wrap">

      </div>
      <div class="cal-grid">${dowHeaders}${dayCells}</div>
    </div>`;

  // Session detail area
  let sessionsHtml = '';
  if (selectedHistoryDate) {
    const w = workouts.find(w => w.date === selectedHistoryDate);
    if (w) {
      sessionsHtml = `<div class="section-heading">Session — ${parseIso(selectedHistoryDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>

    }
  }

  page.innerHTML = calHtml + sessionsHtml;

function drawSparkline(p) {
  const safeEx = p.exercise.replace(/[^a-z0-9]/gi, '_');
  const canvas = document.getElementById('spark-' + safeEx);
  if (!canvas) return;
  const history = p.sessionHistory || [];
  if (history.length < 2) { canvas.style.opacity = '0.2'; return; }
  const dpr = window.devicePixelRatio || 1;
  const W = 60, H = 28;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  const n = history.length;
  const vals = history;
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const rng = maxV - minV || 1;
  const toX = i => 2 + (i / (n - 1)) * (W - 4);
  const toY = v => (H - 4) - ((v - minV) / rng) * (H - 8) + 2;
  const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
  const green   = getComputedStyle(document.documentElement).getPropertyValue('--green').trim() || '#22c55e';
  const color = vals[n-1] > vals[0] ? green : vals[n-1] < vals[0] ? primary : '#888';
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  vals.forEach((v, i) => { i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v)); });
  ctx.stroke();
  // End dot
  ctx.beginPath();
  ctx.fillStyle = color;
  ctx.arc(toX(n-1), toY(vals[n-1]), 2.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawVolumeChart(data) {
  const canvas = document.getElementById('volChart');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = 180;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const PAD_L = 8, PAD_R = 8, PAD_T = 24, PAD_B = 28;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;
  const n = data.length;
  const maxVal = Math.max(...data.map(d => d.value), 1) * 1.12;
  const peakVal = Math.max(...data.map(d => d.value));
  const colW = chartW / n;
  const barW = colW * 0.52;
  const offset = (colW - barW) / 2;

  const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
  const accent  = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let g = 1; g <= 3; g++) {
    const gy = PAD_T + chartH - (g / 4) * chartH;
    ctx.beginPath(); ctx.moveTo(PAD_L, gy); ctx.lineTo(W - PAD_R, gy); ctx.stroke();
  }

  data.forEach((d, i) => {
    if (!d.value) return;
    const x   = PAD_L + i * colW + offset;
    const bH  = Math.max((d.value / maxVal) * chartH, 4);
    const y   = PAD_T + chartH - bH;
    const isPeak = d.value === peakVal;

    // Bar gradient
    const grad = ctx.createLinearGradient(0, y, 0, PAD_T + chartH);
    grad.addColorStop(0, isPeak ? accent : primary);
    grad.addColorStop(1, isPeak ? accent + '88' : primary + '55');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, bH, [3, 3, 0, 0]);
    ctx.fill();

    // Value label above bar
    ctx.fillStyle = isPeak ? accent : 'rgba(255,255,255,0.75)';
    ctx.font = `bold 9px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    const lbl = d.value >= 10000 ? `${(d.value/1000).toFixed(0)}k` : `${(d.value/1000).toFixed(1)}k`;
    ctx.fillText(lbl, x + barW / 2, y - 5);
  });

  // Week labels — only show every other to avoid crowding
  data.forEach((d, i) => {
    if (i % 2 !== 0 && i !== n - 1) return;
    const x = PAD_L + i * colW + offset;
    ctx.fillStyle = i === n - 1 ? 'rgba(255,255,255,0.9)' : '#6b7280';
    ctx.font = `8px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    const shortLbl = d.weeksAgo === 0 ? 'now' : `${d.weeksAgo}w`;
    ctx.fillText(shortLbl, x + barW / 2, H - 8);
  });
}

function getGoals() {
  return JSON.parse(localStorage.getItem('gymdash_goals') || '[]');
}
function saveGoals(goals) {
  localStorage.setItem('gymdash_goals', JSON.stringify(goals));
}
function getExercisePRHistory(exercise) {
  const { workouts } = getData();
  const sorted = [...workouts].sort((a,b) => parseIso(a.date) - parseIso(b.date));
  let runningMax = 0;
  const history = [];
  sorted.forEach(w => {
    const best = w.sets.filter(s => s.exercise === exercise && !s.bodyweight)
                       .reduce((m, s) => Math.max(m, s.weight), 0);
    if (best > 0) {
      runningMax = Math.max(runningMax, best);
      const d = parseIso(w.date);
      history.push({ label: `${d.getMonth()+1}/${d.getDate()}`, value: runningMax, date: w.date });
    }
  });
  return history;
}
function getCurrentPR(exercise) {
  const { workouts } = getData();
  let max = 0;
  workouts.forEach(w => w.sets.forEach(s => { if (s.exercise === exercise && !s.bodyweight && s.weight > max) max = s.weight; }));
  return max;
}
function getDaysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00');
  return Math.round((target - today) / 86400000);
}

function buildGoalCard(g) {
  const currentPR = getCurrentPR(g.exercise);
  const pct = g.targetWeight > 0 ? Math.min(100, Math.round((currentPR / g.targetWeight) * 100)) : 0;
  const remaining = Math.max(0, g.targetWeight - currentPR);
  const daysLeft = getDaysUntil(g.deadline);
  let deadlineBadge = '';
  if (daysLeft !== null) {
    const cls = daysLeft < 0 ? 'overdue' : daysLeft <= 14 ? 'soon' : '';
    const label = daysLeft < 0 ? `${Math.abs(daysLeft)}d overdue` : daysLeft === 0 ? 'Due today' : `${daysLeft}d left`;
    deadlineBadge = `<span class="goal-deadline-badge ${cls}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:10px;height:10px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      ${label}</span>`;
  }
  const completedBadge = pct >= 100
    ? `<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);background:rgba(245,158,11,0.12);border-radius:20px;padding:3px 8px;margin-left:6px">✓ ACHIEVED</span>`
    : '';

  return `
    <div class="goal-card" id="goal-${g.id}">
      <div class="goal-header">
        <div>
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
            <div class="goal-exercise">${g.exercise}</div>${completedBadge}
          </div>
          ${deadlineBadge}
        </div>
        <button class="routine-ex-delete" onclick="deleteGoal('${g.id}')" style="font-size:18px;padding:4px 6px">✕</button>
      </div>
      <div class="goal-stats">
        <div class="goal-stat">
          <div class="goal-stat-val current">${currentPR > 0 ? currentPR + ' lbs' : '—'}</div>
          <div class="goal-stat-label">Current PR</div>
        </div>
        <div style="display:flex;align-items:center;color:var(--border);font-size:20px;padding-top:2px">→</div>
        <div class="goal-stat">
          <div class="goal-stat-val target">${g.targetWeight} lbs</div>
          <div class="goal-stat-label">Target</div>
        </div>
        ${remaining > 0 ? `
        <div class="goal-stat" style="margin-left:auto">
          <div class="goal-stat-val" style="font-size:18px;color:var(--text-muted)">${remaining} lbs</div>
          <div class="goal-stat-label">To Go</div>
        </div>` : ''}
      </div>
      <div class="goal-progress-track">
        <div class="goal-progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="goal-progress-label">
        <span>0 lbs</span>
        <span style="color:var(--text);font-weight:700">${pct}%</span>
        <span>${g.targetWeight} lbs</span>
      </div>
      <div class="goal-mini-chart">
        <canvas id="goal-chart-${g.id}" height="80"></canvas>
      </div>
    </div>`;
}

function drawGoalMiniChart(g) {
  const canvas = document.getElementById('goal-chart-' + g.id);
  if (!canvas) return;
  const history = getExercisePRHistory(g.exercise);
  if (history.length < 2) {
    const ctx2 = canvas.getContext('2d');
    canvas.style.display = 'none';
    return;
  }
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth; const H = 80;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const PAD_L=8, PAD_R=8, PAD_T=14, PAD_B=18;
  const cW = W-PAD_L-PAD_R, cH = H-PAD_T-PAD_B;
  const n = history.length;
  const vals = history.map(p => p.value);
  const minV = Math.min(...vals) * 0.95;
  const maxV = Math.max(Math.max(...vals), g.targetWeight) * 1.02;
  const toX = i => PAD_L + (n > 1 ? (i/(n-1)) * cW : cW/2);
  const toY = v => PAD_T + cH - ((v - minV) / (maxV - minV)) * cH;

  const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
  const accent  = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  const border  = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();

  // Target line
  const ty = toY(g.targetWeight);
  if (ty >= PAD_T && ty <= PAD_T + cH) {
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = accent + 'AA';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(PAD_L, ty); ctx.lineTo(W-PAD_R, ty); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = accent;
    ctx.font = `bold 9px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'right';
    ctx.fillText('TARGET', W - PAD_R - 2, ty - 3);
  }

  // PR line fill
  const grad = ctx.createLinearGradient(0, PAD_T, 0, PAD_T + cH);
  grad.addColorStop(0, primary + '44'); grad.addColorStop(1, primary + '00');
  ctx.beginPath();
  history.forEach((p, i) => { i===0 ? ctx.moveTo(toX(i), toY(p.value)) : ctx.lineTo(toX(i), toY(p.value)); });
  ctx.lineTo(toX(n-1), PAD_T+cH); ctx.lineTo(toX(0), PAD_T+cH); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // PR line
  ctx.beginPath(); ctx.strokeStyle = primary; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  history.forEach((p, i) => { i===0 ? ctx.moveTo(toX(i), toY(p.value)) : ctx.lineTo(toX(i), toY(p.value)); });
  ctx.stroke();

  // Dots + labels
  history.forEach((p, i) => {
    ctx.beginPath(); ctx.fillStyle = primary;
    ctx.arc(toX(i), toY(p.value), 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#A3A3A3'; ctx.font = `9px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    if (i === 0 || i === n-1 || n <= 5) ctx.fillText(p.label, toX(i), H - 3);
  });
}

function saveNewGoal() {
  const sel = document.getElementById('goalExercise').value;
  const exercise = sel === '__custom'
    ? document.getElementById('goalCustomEx').value.trim()
    : sel;
  const target = parseFloat(document.getElementById('goalTarget').value);
  const deadline = document.getElementById('goalDeadline').value || null;
  if (!exercise) { showToast('Select or enter an exercise'); return; }
  if (!target || target <= 0) { showToast('Enter a target weight'); return; }
  const goals = getGoals();
  if (goals.some(g => g.exercise === exercise)) { showToast('Goal for ' + exercise + ' already exists'); return; }
  goals.push({ id: generateId(), exercise, targetWeight: target, deadline });
  saveGoals(goals);
  showToast('Goal set: ' + exercise + ' → ' + target + ' lbs');
  renderGoals();
}

  const goals = getGoals().filter(g => g.id !== id);
  saveGoals(goals);
  renderGoals();
}

  if (currentRoutine === name) {
    currentRoutine = Object.keys(getData().routines)[0] || 'Chest';
  }
  showToast(`Deleted "${name}"`);
  renderSettings();

function triggerImport() {
  if (window.showOpenFilePicker) {
    window.showOpenFilePicker({ multiple: false })
      .then(async ([handle]) => {
        const file = await handle.getFile();
        const text = await file.text();
        processImportText(text);
      }).catch(() => {});
  } else {
    document.getElementById('csvFileInput').click();
  }
}

function exportCSV() {
  const { workouts } = getData();
  let csv = 'Date,Exercise,Weight,Reps\n';
  workouts.forEach(w => {
    w.sets.forEach(s => {
      csv += `${w.date},${s.exercise},${s.weight},${s.reps}\n`;
    });
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'workouts.csv';

// ── CSV IMPORT ──
function inferRoutine(exercises) {
  const counts = Object.entries(DEFAULT_ROUTINES).map(([routine, exList]) => ({
    routine,
    count: exercises.filter(e => exList.some(r => e.toLowerCase().includes(r.toLowerCase()))).length
  }));
  counts.sort((a,b) => b.count - a.count);
  return counts[0].count > 0 ? counts[0].routine : 'Other';
}

function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { processImportText(e.target.result); input.value = ''; };
  reader.readAsText(file);
}

function processImportText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const header = lines[0].toLowerCase();
  const dataLines = header.includes('date') ? lines.slice(1) : lines;

  const rawSessions = {};
  let skipped = 0;

  dataLines.forEach(line => {
    const parts = line.split(',');
    if (parts.length < 4) { skipped++; return; }
    const [rawDate, exercise, rawWeight, rawReps] = parts.map(p => p.trim());
    const d = parseIso(rawDate);
    if (!d || isNaN(d.getTime())) { skipped++; return; }
    const weight = parseFloat(rawWeight);
    const reps   = parseInt(rawReps);
    if (isNaN(weight) || isNaN(reps)) { skipped++; return; }
    const dateKey = isoDate(d);
    if (!rawSessions[dateKey]) rawSessions[dateKey] = [];
    rawSessions[dateKey].push({ exercise, weight, reps });
  });

  const { workouts } = getData();
  const existingDates = new Set(workouts.map(w => w.date));
  let imported = 0;

  Object.entries(rawSessions).forEach(([date, sets]) => {
    if (existingDates.has(date)) { skipped += sets.length; return; }
    const routine = inferRoutine(sets.map(s => s.exercise));
    workouts.push({ id: generateId(), date, routine, sets });
    imported++;
  });

  workouts.sort((a,b) => parseIso(b.date) - parseIso(a.date));
  saveWorkouts(workouts);

  showToast(`Imported ${imported} sessions. Skipped ${skipped} rows.`);
  renderLog();
}

function adjustWater(delta) {
  const today = isoDate(new Date());
  const day = getNutritionDay(today);
  day.water = Math.max(0, (day.water || 0) + delta);
  saveNutritionDay(today, day);
  renderNutrition();
}
function toggleCreatine() {
  const today = isoDate(new Date());
  const day = getNutritionDay(today);
  day.creatine = !day.creatine;
  saveNutritionDay(today, day);
  renderNutrition();
}
function saveNutritionSimple(field, value) {
  const today = isoDate(new Date());
  const day = getNutritionDay(today);
  day[field] = value;
  saveNutritionDay(today, day);
}
function toggleNutritionCustom(id) {
  const today = isoDate(new Date());
  const day = getNutritionDay(today);
  if (!day.custom) day.custom = {};
  day.custom[id] = !day.custom[id];
  saveNutritionDay(today, day);
  renderNutrition();
}
function adjustNutritionCustom(id, delta) {
  const today = isoDate(new Date());
  const day = getNutritionDay(today);
  if (!day.custom) day.custom = {};
  day.custom[id] = Math.max(0, ((day.custom[id] || 0) + delta));
  saveNutritionDay(today, day);
  renderNutrition();
}
function saveNutritionCustomNumber(id, value) {
  const today = isoDate(new Date());
  const day = getNutritionDay(today);
  if (!day.custom) day.custom = {};
  day.custom[id] = value !== '' ? +value : null;
  saveNutritionDay(today, day);
}
function setNutriChartMetric(metric) {
  nutChartMetric = metric;
  renderNutrition();
}
function setNutriChartRange(range) {
  nutChartRange = range;
  renderNutrition();
}

// ── NUTRITION CHART ──
function getNutriMetricValue(day, metric) {
  if (metric === 'weight') return (day.weight !== null && day.weight !== undefined) ? +day.weight : null;
  if (metric === 'sleep')  return (day.sleep  !== null && day.sleep  !== undefined) ? +day.sleep  : null;
  const v = (day.custom || {})[metric];
  return (v !== null && v !== undefined) ? +v : null;
}
function drawNutritionChart() {
  const canvas = document.getElementById('nutri-chart');
  if (!canvas) return;
  const all   = getAllNutrition();
  const today = new Date();
  const points = [];

  if (nutChartRange === '30D') {
    for (let i = 29; i >= 0; i--) {
      const d = new Date(today); d.setDate(today.getDate() - i);
      const key = isoDate(d);
      const day = Object.assign({ water:0, protein:0, creatine:false, weight:null, sleep:null, custom:{} }, all[key] || {});
      const show = (i === 0 || i === 7 || i === 14 || i === 21 || i === 28);
      points.push({ label: show ? d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}) : '', value: getNutriMetricValue(day, nutChartMetric) });
    }
  } else if (nutChartRange === '12W') {
    for (let w = 11; w >= 0; w--) {
      const weekEnd = new Date(today); weekEnd.setDate(today.getDate() - w * 7);
      const weekStart = new Date(weekEnd); weekStart.setDate(weekEnd.getDate() - 6);
      const vals = [];
      for (let dd = new Date(weekStart); dd <= weekEnd; dd.setDate(dd.getDate() + 1)) {
        const v = getNutriMetricValue(Object.assign({ water:0, protein:0, creatine:false, weight:null, sleep:null, custom:{} }, all[isoDate(new Date(dd))] || {}), nutChartMetric);
        if (v !== null) vals.push(v);
      }
      const avg = vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
      points.push({ label: (w % 3 === 0) ? weekEnd.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '', value: avg });
    }
  } else {
    for (let m = 5; m >= 0; m--) {
      const firstDay = new Date(today.getFullYear(), today.getMonth() - m, 1);
      const lastDay  = new Date(today.getFullYear(), today.getMonth() - m + 1, 0);
      const vals = [];
      for (let d = new Date(firstDay); d <= lastDay; d.setDate(d.getDate() + 1)) {
        const v = getNutriMetricValue(Object.assign({ water:0, protein:0, creatine:false, weight:null, sleep:null, custom:{} }, all[isoDate(new Date(d))] || {}), nutChartMetric);
        if (v !== null) vals.push(v);
      }
      const avg = vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
      points.push({ label: firstDay.toLocaleDateString('en-US',{month:'short'}), value: avg });
    }
  }

  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.offsetWidth;
  const H   = 180;
  canvas.width  = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const validPts = points.map((p, i) => ({ ...p, i })).filter(p => p.value !== null);
  if (!validPts.length) {
    ctx.fillStyle = '#A3A3A3';
    ctx.font = '13px Raleway, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No data yet — log your first entry above', W / 2, H / 2);
    return;
  }

  const PAD_L = 10, PAD_R = 10, PAD_T = 20, PAD_B = 28;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;
  const n = points.length;
  const vals = validPts.map(p => p.value);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const span = maxV - minV || 1;
  const lo = minV - span * 0.1, hi = maxV + span * 0.1;
  const toX = i => PAD_L + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2);
  const toY = v => PAD_T + chartH - ((v - lo) / (hi - lo)) * chartH;

  const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
  const accent  = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();

  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  [0.25, 0.5, 0.75].forEach(pct => {
    const y = PAD_T + chartH * (1 - pct);
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
  });

  ctx.fillStyle = '#A3A3A3';
  ctx.font = `9px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'center';
  points.forEach((p, i) => { if (p.label) ctx.fillText(p.label, toX(i), H - 6); });

  if (validPts.length > 1) {
    const grad = ctx.createLinearGradient(0, PAD_T, 0, PAD_T + chartH);
    grad.addColorStop(0, primary + '44');
    grad.addColorStop(1, primary + '00');
    ctx.beginPath();
    validPts.forEach((p, idx) => { const x = toX(p.i), y = toY(p.value); idx === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
    ctx.lineTo(toX(validPts[validPts.length-1].i), PAD_T + chartH);
    ctx.lineTo(toX(validPts[0].i), PAD_T + chartH);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.strokeStyle = primary;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    validPts.forEach((p, idx) => { const x = toX(p.i), y = toY(p.value); idx === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
    ctx.stroke();
  }

  validPts.forEach(p => {
    ctx.beginPath();
    ctx.fillStyle = primary;
    ctx.arc(toX(p.i), toY(p.value), 3.5, 0, Math.PI * 2);
    ctx.fill();
  });

  const last = validPts[validPts.length - 1];
  if (last) {
    ctx.fillStyle = accent;
    ctx.font = `bold 11px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(String(last.value), toX(last.i), toY(last.value) - 8);
  }
}

// ── CUSTOM METRIC MANAGEMENT ──
let newMetricType = 'toggle';
function showAddMetricForm() {
  document.getElementById('section-custom-metrics').classList.add('expanded');
  document.getElementById('newMetricForm').style.display = 'block';
  document.getElementById('addMetricBtn').style.display = 'none';
  newMetricType = 'toggle';
  document.querySelectorAll('.nutri-type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mtype-toggle').classList.add('active');
  document.getElementById('metricUnitRow').style.display = 'none';
}
function cancelNewMetric() {
  document.getElementById('newMetricForm').style.display = 'none';
  document.getElementById('addMetricBtn').style.display = '';
}
function selectMetricType(type) {
  newMetricType = type;
  document.querySelectorAll('.nutri-type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mtype-' + type).classList.add('active');
  document.getElementById('metricUnitRow').style.display = type === 'number' ? 'block' : 'none';
}
function saveNewCustomMetric() {
  const name = document.getElementById('newMetricName').value.trim();
  if (!name) { showToast('Enter a metric name'); return; }
  const unit = newMetricType === 'number' ? (document.getElementById('newMetricUnit').value.trim()) : '';
  const cfg = getNutritionConfig();
  cfg.customMetrics.push({ id: 'cm_' + Date.now(), name, type: newMetricType, unit });
  saveNutritionConfig(cfg);
  showToast('Added: ' + name);
  renderNutrition();
}
function deleteCustomMetric(id) {
  const cfg = getNutritionConfig();
  cfg.customMetrics = cfg.customMetrics.filter(m => m.id !== id);
  saveNutritionConfig(cfg);
  if (nutChartMetric === id) nutChartMetric = 'weight';
  renderNutrition();
}

// ── NUTRITION CSV IMPORT / EXPORT ──
function exportNutritionCSV() {
  const all = getAllNutrition();
  const cfg = getNutritionConfig();
  const customHeaders = cfg.customMetrics.map(m => m.name + (m.unit ? '(' + m.unit + ')' : ''));
  let csv = ['Date','Water(cups)','Protein(g)','Creatine','Weight(lbs)','Sleep(hrs)',...customHeaders].join(',') + '\n';
  Object.entries(all).sort(([a],[b]) => a < b ? -1 : 1).forEach(([date, d]) => {
    const customVals = cfg.customMetrics.map(m => { const v = (d.custom||{})[m.id]; return (v !== null && v !== undefined) ? String(v) : ''; });
    csv += [date, d.water||0, d.protein||0, d.creatine?'true':'false', d.weight??'', d.sleep??'', ...customVals].join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'nutrition.csv'; a.click();
  URL.revokeObjectURL(url);
}
function triggerNutritionImport() {
  if (window.showOpenFilePicker) {
    window.showOpenFilePicker({ multiple: false })
      .then(async ([handle]) => { const file = await handle.getFile(); processNutritionImport(await file.text()); })
      .catch(() => {});
  } else {
    document.getElementById('nutriCsvInput').click();
  }
}
function handleNutritionImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { processNutritionImport(e.target.result); input.value = ''; };
  reader.readAsText(file);
}
function processNutritionImport(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) { showToast('No data found in file'); return; }
  const all = getAllNutrition();
  let imported = 0;
  lines.slice(1).forEach(line => {
    const parts = line.split(',');
    const dateStr = parts[0]?.trim();
    if (!dateStr) return;
    const obj = {
      water:    parseFloat(parts[1]) || 0,
      protein:  parseFloat(parts[2]) || 0,
      creatine: parts[3]?.trim() === 'true',
      weight:   parts[4]?.trim() ? parseFloat(parts[4]) : null,
      sleep:    parts[5]?.trim() ? parseFloat(parts[5]) : null,
      custom:   all[dateStr]?.custom || {}
    };
    if (!all[dateStr]) imported++;
    all[dateStr] = { ...all[dateStr], ...obj };
  });
  localStorage.setItem('gymdash_nutrition', JSON.stringify(all));
  showToast('Imported ' + imported + ' nutrition entries');
  renderNutrition();
}

if ('serviceWorker' in navigator) {

    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });

document.getElementById('topbarDate').textContent =
