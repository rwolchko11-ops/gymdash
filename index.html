<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#DC2626" />
<link rel="manifest" href="/gymdash/manifest.json" />
<title>GymDash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/gymdash/app.js"></script>
  <link rel="stylesheet" crossorigin href="/gymdash/index.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-title">GYM<span>DASH</span></div>
  <div class="topbar-date" id="topbarDate"></div>
  <button class="topbar-gear" id="topbarGear" onclick="openSettings()" title="Settings">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</div>

<div class="page active" id="page-log"></div>
<div class="page" id="page-history"></div>
<div class="page" id="page-progress"></div>
<div class="page" id="page-trophies"></div>
<div class="page" id="page-goals"></div>
<div class="page" id="page-nutrition"></div>
<div class="page" id="page-settings"></div>

<div class="toast" id="toast"></div>

<nav class="bottomnav">
  <button class="nav-tab active" onclick="switchTab('log',this)">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="8.5" width="3" height="7" rx="1"/><rect x="17" y="8.5" width="3" height="7" rx="1"/>
      <rect x="2" y="10.5" width="2" height="3" rx="0.5"/><rect x="20" y="10.5" width="2" height="3" rx="0.5"/>
      <line x1="7" y1="12" x2="17" y2="12"/>
    </svg>
    <span class="nav-label">Log</span>
  </button>
  <button class="nav-tab" onclick="switchTab('history',this)">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/>
    </svg>
    <span class="nav-label">History</span>
  </button>
  <button class="nav-tab" onclick="switchTab('progress',this)">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="2" y1="20" x2="22" y2="20"/>
      <line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="6"/><line x1="18" y1="20" x2="18" y2="10"/>
    </svg>
    <span class="nav-label">Progress</span>
  </button>
  <button class="nav-tab" onclick="switchTab('trophies',this)">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 21h8M12 17v4"/>
      <path d="M7 4H5a2 2 0 0 0-2 2v1a4 4 0 0 0 4 4h0"/>
      <path d="M17 4h2a2 2 0 0 1 2 2v1a4 4 0 0 1-4 4h0"/>
      <path d="M7 4h10v8a5 5 0 0 1-10 0V4z"/>
    </svg>
    <span class="nav-label">Trophies</span>
  </button>
  <button class="nav-tab" onclick="switchTab('goals',this)">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="12" r="6"/>
      <circle cx="12" cy="12" r="2"/>
    </svg>
    <span class="nav-label">Goals</span>
  </button>
  <button class="nav-tab" onclick="switchTab('nutrition',this)">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a3 3 0 0 1 3 3"/>
      <path d="M8.5 5C6 5 3 8 3 12c0 5 3 9 5 9 1.5 0 2.5-1 4-1s2.5 1 4 1c2 0 5-4 5-9 0-4-3-7-5.5-7A5 5 0 0 0 8.5 5z"/>
    </svg>
    <span class="nav-label">Fuel</span>
  </button>
</nav>

</body>
</html>
